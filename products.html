<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Products</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════
   RESET & TOKENS
═══════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --p:#0f0f0f;--p2:#525252;--p3:#9a9590;
  --bg:#f7f7f5;--bg2:#f0efeb;--bg3:#e8e5de;
  --border:#e8e5de;--surface:#ffffff;
  --primary:#111111;--accent:#111111;
  --green:#059669;--red:#dc2626;--yellow:#d97706;
  --radius:12px;--btn-r:8px;--navbar-h:64px;
  --font:'Plus Jakarta Sans',system-ui,sans-serif;
  --font-display:'Cormorant Garamond',Georgia,serif;
  --ease:cubic-bezier(.4,0,.2,1);
  --ease-spring:cubic-bezier(.34,1.56,.64,1);
  --sh0:0 1px 2px rgba(0,0,0,.04);
  --sh1:0 4px 20px rgba(0,0,0,.06),0 1px 4px rgba(0,0,0,.03);
  --sh2:0 20px 60px rgba(0,0,0,.10),0 4px 16px rgba(0,0,0,.05);
  --card-shadow:0 1px 3px rgba(0,0,0,.04),0 2px 10px rgba(0,0,0,.04);
  --card-shadow-hover:0 12px 40px rgba(0,0,0,.11),0 4px 14px rgba(0,0,0,.06);
  --sidebar-w:248px;
  --navbar-bg:rgba(247,247,245,.96);
}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:99px}
::-webkit-scrollbar-thumb:hover{background:var(--p3)}
body{font-family:var(--font);background:var(--bg);color:var(--p);-webkit-font-smoothing:antialiased;min-height:100vh}
img{display:block;max-width:100%}
a{color:inherit;text-decoration:none}
button,input,select{font-family:inherit}

/* ── Animations ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateX(-12px)}to{opacity:1;transform:translateX(0)}}
@keyframes shimmer{0%{background-position:-800px 0}100%{background-position:800px 0}}
@keyframes cardReveal{from{opacity:0;transform:translateY(20px) scale(.98)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulseRing{0%{box-shadow:0 0 0 0 rgba(17,17,17,.18)}70%{box-shadow:0 0 0 7px rgba(17,17,17,0)}100%{box-shadow:0 0 0 0 rgba(17,17,17,0)}}

/* ═══════════════════════════════════════
   NAV
═══════════════════════════════════════ */
.page-nav{
  background:var(--navbar-bg,rgba(247,247,245,.96));
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-bottom:1px solid rgba(0,0,0,.07);
  position:sticky;top:0;z-index:300;height:var(--navbar-h);
}
.nav-inner{
  max-width:1440px;margin:0 auto;
  padding:0 36px;height:100%;
  display:flex;align-items:center;gap:24px;
}
.nav-logo{
  font-family:var(--font-display);font-size:21px;font-weight:400;
  letter-spacing:-.01em;display:flex;align-items:center;gap:10px;
  flex-shrink:0;cursor:pointer;color:var(--p);
}
.nav-logo img{height:28px;border-radius:5px;object-fit:contain}
.nav-logo-txt{white-space:nowrap}
.nav-breadcrumb{
  display:flex;align-items:center;gap:7px;
  font-size:12.5px;color:var(--p3);flex:1;min-width:0;overflow:hidden;
}
.nav-breadcrumb a{color:var(--p2);transition:color .15s;white-space:nowrap}
.nav-breadcrumb a:hover{color:var(--p)}
.nav-breadcrumb span{flex-shrink:0;color:var(--bg3)}
.nav-breadcrumb .crumb-current{
  color:var(--p);font-weight:600;font-size:12.5px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.nav-right{display:flex;align-items:center;gap:8px;flex-shrink:0;margin-left:auto}
.nav-acct-btn{
  display:inline-flex;align-items:center;gap:7px;
  height:36px;padding:0 16px;
  border:1.5px solid var(--border);border-radius:100px;
  font-size:12.5px;font-weight:600;color:var(--p2);
  cursor:pointer;background:transparent;transition:all .18s;
}
.nav-acct-btn:hover{border-color:var(--p);color:var(--p);background:rgba(0,0,0,.03)}
.nav-cart-btn{
  display:inline-flex;align-items:center;gap:8px;
  height:36px;padding:0 18px;
  background:var(--p);color:#fff;
  border:none;border-radius:100px;
  font-size:12.5px;font-weight:700;cursor:pointer;
  box-shadow:0 2px 12px rgba(0,0,0,.18);
  transition:background .18s,transform .18s,box-shadow .18s;
}
.nav-cart-btn:hover{background:#2a2a2a;transform:translateY(-1px);box-shadow:0 6px 20px rgba(0,0,0,.22)}
.nav-cart-count{
  display:inline-flex;align-items:center;justify-content:center;
  min-width:18px;height:18px;padding:0 4px;
  background:var(--accent);color:#fff;font-size:9px;font-weight:800;
  border-radius:100px;line-height:1;
  opacity:0;transform:scale(0);transition:opacity .2s,transform .25s var(--ease-spring);
  background:#fff;color:#0f0f0f;
}
.nav-cart-count.on{opacity:1;transform:scale(1)}
.hdr-hamburger{
  width:36px;height:36px;border-radius:8px;border:none;background:transparent;
  cursor:pointer;display:none;align-items:center;justify-content:center;
  color:var(--p2);transition:background .15s;flex-shrink:0;
}
.hdr-hamburger:hover{background:var(--bg2)}
@media(max-width:768px){
  .hdr-hamburger{display:flex}
  .nav-breadcrumb{display:none}
  .nav-inner{padding:0 18px;gap:10px}
}

/* ═══════════════════════════════════════
   MOBILE MENU DRAWER
═══════════════════════════════════════ */
.mob-overlay{position:fixed;inset:0;background:rgba(0,0,0,.48);z-index:500;opacity:0;pointer-events:none;transition:opacity .28s;backdrop-filter:blur(6px)}
.mob-overlay.open{opacity:1;pointer-events:auto}
.mob-drawer{position:fixed;top:0;left:0;bottom:0;width:310px;max-width:90vw;background:var(--surface);z-index:501;transform:translateX(-100%);transition:transform .32s var(--ease);display:flex;flex-direction:column;box-shadow:6px 0 48px rgba(0,0,0,.14)}
.mob-drawer.open{transform:translateX(0)}
.mob-drawer-hd{display:flex;align-items:center;justify-content:space-between;padding:0 22px;height:64px;border-bottom:1px solid var(--border);flex-shrink:0}
.mob-drawer-logo{font-family:var(--font-display);font-size:20px;font-weight:400;letter-spacing:-.01em;color:var(--p)}
.mob-close{width:34px;height:34px;border-radius:8px;border:none;background:var(--bg2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;color:var(--p2);transition:background .15s}
.mob-close:hover{background:var(--bg3)}
.mob-drawer-body{flex:1;overflow-y:auto;padding:18px}
.mob-filters-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.14em;color:var(--p3);margin:14px 0 9px}
.mob-cat-btn{display:flex;align-items:center;justify-content:space-between;width:100%;padding:10px 14px;border-radius:9px;border:none;background:transparent;font-size:13.5px;font-weight:500;color:var(--p2);cursor:pointer;text-align:left;transition:background .12s,color .12s}
.mob-cat-btn:hover{background:var(--bg2);color:var(--p)}
.mob-cat-btn.active{background:var(--primary);color:#fff}
.mob-cat-count{font-size:11px;opacity:.6;flex-shrink:0}
.mob-divider{height:1px;background:var(--border);margin:14px 0}
.mob-sort-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.14em;color:var(--p3);margin:0 0 9px}
.mob-sort-opt{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:9px;border:none;background:transparent;font-size:13.5px;font-weight:500;color:var(--p2);cursor:pointer;width:100%;text-align:left;transition:background .12s,color .12s}
.mob-sort-opt:hover{background:var(--bg2);color:var(--p)}
.mob-sort-opt.active{color:var(--primary);font-weight:700}
.mob-sort-opt.active::before{content:'✓';margin-right:2px}
.mob-drawer-foot{padding:18px;border-top:1px solid var(--border);flex-shrink:0}
.mob-apply-btn{width:100%;padding:13px;background:var(--primary);color:#fff;border:none;border-radius:var(--btn-r);font-size:13.5px;font-weight:700;cursor:pointer;transition:opacity .15s,transform .15s var(--ease-spring);letter-spacing:.02em}
.mob-apply-btn:hover{opacity:.88;transform:translateY(-1px)}

/* ═══════════════════════════════════════
   HERO STRIP
═══════════════════════════════════════ */
.page-hero{
  background:var(--surface);
  border-bottom:1px solid var(--border);
  padding:36px 36px 30px;
  animation:fadeUp .5s var(--ease) both;
}
.page-hero-inner{max-width:1440px;margin:0 auto;display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap}
.page-hero h1{
  font-family:var(--font-display);font-size:clamp(26px,3.5vw,40px);
  font-weight:400;letter-spacing:-.02em;color:var(--p);line-height:1.15;
  font-style:italic;
}
.page-hero h1 em{font-style:normal;font-weight:500}
.page-hero-meta{font-size:13px;color:var(--p3);margin-top:5px;letter-spacing:.01em}
.page-hero-meta span{color:var(--primary);font-weight:600}
.hero-line{
  display:block;width:40px;height:1.5px;background:var(--p3);margin-bottom:12px;opacity:.4;
}

/* ═══════════════════════════════════════
   LAYOUT WRAPPER
═══════════════════════════════════════ */
.shop-layout{
  max-width:1440px;margin:0 auto;
  display:grid;
  grid-template-columns:var(--sidebar-w) 1fr;
  gap:0;
  padding:0;
  min-height:calc(100vh - var(--navbar-h));
  align-items:start;
}

/* ═══════════════════════════════════════
   SIDEBAR
═══════════════════════════════════════ */
.sidebar{
  position:sticky;top:var(--navbar-h);
  height:calc(100vh - var(--navbar-h));
  overflow-y:auto;
  border-right:1px solid var(--border);
  padding:24px 0 32px;
  scrollbar-width:thin;
  background:var(--surface);
  animation:slideIn .45s var(--ease) both;
}
.sidebar::-webkit-scrollbar{width:3px}
.sidebar::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px}

.sidebar-section{padding:0 18px 22px;border-bottom:1px solid var(--border);margin-bottom:0}
.sidebar-section:last-child{border-bottom:none}
.sidebar-title{
  font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.15em;
  color:var(--p3);margin-bottom:12px;padding-top:20px;
}
.cat-list{display:flex;flex-direction:column;gap:2px}
.cat-btn{
  display:flex;align-items:center;justify-content:space-between;
  padding:9px 13px;border-radius:9px;border:none;background:transparent;
  font-size:13px;font-weight:500;color:var(--p2);cursor:pointer;
  text-align:left;width:100%;transition:background .15s,color .15s;
  gap:6px;
}
.cat-btn:hover{background:var(--bg2);color:var(--p)}
.cat-btn.active{
  background:linear-gradient(135deg,var(--primary),#2a2a2a);
  color:#fff;font-weight:600;
  box-shadow:0 3px 12px rgba(0,0,0,.16);
}
.cat-btn-name{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-align:left}
.cat-btn-count{
  font-size:10.5px;padding:2px 8px;border-radius:99px;
  background:rgba(0,0,0,.07);color:var(--p3);flex-shrink:0;
  transition:background .15s,color .15s;font-weight:600;
}
.cat-btn.active .cat-btn-count{background:rgba(255,255,255,.18);color:rgba(255,255,255,.8)}

/* Price Range */
.price-inputs{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:6px}
.price-input-wrap{display:flex;flex-direction:column;gap:5px}
.price-input-wrap label{font-size:10px;color:var(--p3);font-weight:700;text-transform:uppercase;letter-spacing:.1em}
.price-input{
  width:100%;padding:9px 11px;border:1.5px solid var(--border);border-radius:8px;
  font-size:13px;background:var(--bg);color:var(--p);outline:none;
  transition:border-color .18s,box-shadow .18s;
}
.price-input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(0,0,0,.06)}
.price-apply-btn{
  width:100%;margin-top:10px;padding:9px;
  background:var(--primary);color:#fff;border:none;border-radius:8px;
  font-size:12px;font-weight:700;cursor:pointer;transition:opacity .15s,transform .15s var(--ease-spring);
  letter-spacing:.04em;text-transform:uppercase;
}
.price-apply-btn:hover{opacity:.88;transform:translateY(-1px)}

/* Sort sidebar */
.sort-list{display:flex;flex-direction:column;gap:2px}
.sort-btn{
  display:flex;align-items:center;gap:10px;
  padding:9px 13px;border-radius:9px;border:none;background:transparent;
  font-size:13px;font-weight:500;color:var(--p2);cursor:pointer;
  text-align:left;width:100%;transition:background .15s,color .15s;
}
.sort-btn:hover{background:var(--bg2);color:var(--p)}
.sort-btn.active{color:var(--primary);font-weight:700}
.sort-btn.active::before{
  content:'';width:6px;height:6px;border-radius:50%;
  background:var(--primary);flex-shrink:0;display:inline-block;
}
.sort-btn:not(.active)::before{
  content:'';width:6px;height:6px;border-radius:50%;
  border:1.5px solid var(--bg3);flex-shrink:0;display:inline-block;
}

/* Active filters tags */
.active-filters{padding:14px 18px 0;display:flex;flex-wrap:wrap;gap:6px}
.filter-tag{
  display:inline-flex;align-items:center;gap:5px;
  padding:4px 11px;background:rgba(17,17,17,.06);
  border-radius:99px;font-size:11.5px;font-weight:600;color:var(--p2);
  cursor:pointer;transition:background .15s;border:none;
}
.filter-tag:hover{background:rgba(17,17,17,.12)}
.filter-tag span{font-size:13px;line-height:1;color:var(--p3)}
.clear-all-btn{
  display:inline-flex;align-items:center;gap:4px;
  padding:4px 11px;background:transparent;border:1.5px solid var(--border);
  border-radius:99px;font-size:11.5px;font-weight:600;color:var(--p3);
  cursor:pointer;transition:all .15s;
}
.clear-all-btn:hover{border-color:var(--red);color:var(--red)}

/* ═══════════════════════════════════════
   MAIN CONTENT
═══════════════════════════════════════ */
.main-content{padding:24px 32px 80px;min-width:0;animation:fadeUp .5s .1s var(--ease) both}

/* ── Toolbar ── */
.toolbar{display:flex;align-items:center;gap:10px;margin-bottom:18px;flex-wrap:wrap}
.toolbar-left{display:flex;align-items:center;gap:8px;flex:1;min-width:0;flex-wrap:wrap}
.result-count{font-size:12.5px;font-weight:500;color:var(--p3);white-space:nowrap;flex-shrink:0}
.toolbar-right{display:flex;align-items:center;gap:8px;flex-shrink:0;margin-left:auto}

/* Search bar */
.search-wrap{position:relative;display:flex;align-items:center;min-width:200px;max-width:320px;flex:1}
.search-icon{position:absolute;left:12px;color:var(--p3);pointer-events:none;flex-shrink:0}
.search-input{
  width:100%;height:38px;padding:0 34px 0 36px;
  border:1.5px solid var(--border);border-radius:var(--btn-r);
  background:var(--surface);font-size:13px;color:var(--p);
  outline:none;transition:border-color .18s,box-shadow .18s;
}
.search-input::placeholder{color:var(--p3)}
.search-input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(0,0,0,.05)}
.search-clear{
  position:absolute;right:10px;width:18px;height:18px;border-radius:50%;
  border:none;background:var(--bg3);cursor:pointer;display:none;
  align-items:center;justify-content:center;font-size:9px;color:var(--p2);
  transition:background .12s;
}
.search-clear.on{display:flex}
.search-clear:hover{background:var(--p3);color:#fff}

/* Mobile filter button */
.mob-filter-btn{
  display:none;align-items:center;gap:6px;
  height:38px;padding:0 16px;
  border:1.5px solid var(--border);border-radius:var(--btn-r);
  background:var(--surface);font-size:13px;font-weight:600;color:var(--p2);
  cursor:pointer;transition:all .15s;white-space:nowrap;flex-shrink:0;
}
.mob-filter-btn:hover{border-color:var(--p);color:var(--p)}
.mob-filter-badge{
  display:inline-flex;align-items:center;justify-content:center;
  min-width:16px;height:16px;padding:0 4px;
  background:var(--primary);color:#fff;font-size:9px;font-weight:800;
  border-radius:99px;line-height:1;
}

/* Sort dropdown */
.sort-select{
  height:38px;padding:0 32px 0 12px;
  border:1.5px solid var(--border);border-radius:var(--btn-r);
  background:var(--surface) url("data:image/svg+xml,%3Csvg width='9' height='5' viewBox='0 0 9 5' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l3.5 3L8 1' stroke='%239a9590' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round' fill='none'/%3E%3C/svg%3E") no-repeat right 10px center;
  font-size:13px;color:var(--p);outline:none;cursor:pointer;
  appearance:none;-webkit-appearance:none;
  transition:border-color .15s;white-space:nowrap;flex-shrink:0;
}
.sort-select:focus{border-color:var(--primary)}

/* View toggle */
.view-toggle{
  display:flex;border:1.5px solid var(--border);border-radius:var(--btn-r);
  overflow:hidden;height:38px;flex-shrink:0;
}
.view-btn{
  width:38px;height:100%;border:none;background:transparent;color:var(--p3);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:background .15s,color .15s;
}
.view-btn.active{background:var(--p);color:#fff}
.view-btn:hover:not(.active){background:var(--bg2);color:var(--p)}
.view-btn+.view-btn{border-left:1.5px solid var(--border)}

/* ── Category Pills ── */
.cat-pills{
  display:flex;gap:6px;overflow-x:auto;margin-bottom:20px;
  scrollbar-width:none;-ms-overflow-style:none;padding-bottom:2px;
}
.cat-pills::-webkit-scrollbar{display:none}
.cat-pill{
  display:inline-flex;align-items:center;gap:5px;
  padding:6px 16px;border-radius:99px;
  border:1.5px solid var(--border);background:var(--surface);
  font-size:12.5px;font-weight:600;color:var(--p2);
  cursor:pointer;white-space:nowrap;flex-shrink:0;
  transition:all .18s;
}
.cat-pill:hover{border-color:var(--p);color:var(--p);background:var(--bg2)}
.cat-pill.active{background:var(--primary);color:#fff;border-color:var(--primary);box-shadow:0 3px 14px rgba(0,0,0,.18)}

/* ── Product Grid ── */
.products-grid{
  display:grid;
  grid-template-columns:repeat(var(--cols,3),1fr);
  gap:16px;
}
.products-grid.list-view{grid-template-columns:1fr;gap:10px}

/* ── Product Card ── */
.product-card{
  background:var(--surface);border-radius:var(--radius);overflow:hidden;
  position:relative;cursor:pointer;display:flex;flex-direction:column;
  border:1px solid var(--border);box-shadow:var(--card-shadow);
  transition:transform .28s var(--ease),box-shadow .28s var(--ease),border-color .22s;
  will-change:transform;
  animation:cardReveal .4s var(--ease) both;
}
.product-card:hover{transform:translateY(-5px);box-shadow:var(--card-shadow-hover);border-color:#dbd8d1}
.card-link{display:flex;flex-direction:column;flex:1;color:inherit;cursor:pointer}
.product-img{
  width:100%;aspect-ratio:3/4;background:var(--bg2);
  overflow:hidden;position:relative;flex-shrink:0;
}
.product-img img{width:100%;height:100%;object-fit:cover;transition:transform .55s var(--ease);display:block}
.product-card:hover .product-img img{transform:scale(1.07)}
.img-fallback{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:40px;opacity:.08;pointer-events:none}
.product-img.img-err img{display:none}

/* Badges */
.product-badge{
  position:absolute;top:10px;left:10px;
  font-size:9px;font-weight:800;padding:3px 10px;
  border-radius:4px;letter-spacing:.08em;z-index:2;line-height:1.5;
  text-transform:uppercase;
}
.badge-bestseller,.badge-hot{background:#d97706;color:#fff}
.badge-new{background:#059669;color:#fff}
.badge-trending{background:#7c3aed;color:#fff}
.badge-sale,.badge-discount{background:#dc2626;color:#fff}
.badge-custom{background:var(--primary);color:#fff}

/* Wishlist btn */
.wish-btn{
  position:absolute;top:10px;right:10px;width:32px;height:32px;border-radius:50%;
  background:rgba(255,255,255,.94);border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:13px;z-index:3;
  opacity:0;transition:opacity .18s,transform .22s var(--ease-spring);
  box-shadow:0 2px 12px rgba(0,0,0,.14);backdrop-filter:blur(10px);
}
.product-card:hover .wish-btn{opacity:1}

.wish-btn:hover{transform:scale(1.16)}

/* ATC hover overlay */
.card-atc-overlay{

  display:flex;align-items:flex-end;justify-content:center;padding-bottom:14px;
  opacity:0;transition:opacity .22s;z-index:4;pointer-events:none;
}
.product-card:hover .card-atc-overlay{opacity:1;pointer-events:auto}
.card-atc-btn{

  border-radius:99px;font-size:11.5px;font-weight:700;cursor:pointer;

  box-shadow:0 4px 20px rgba(0,0,0,.18);white-space:nowrap;letter-spacing:.02em;

/* Product info */
.product-info{padding:12px 14px 6px;flex:1;min-width:0}
.product-cat{
  font-size:10px;font-weight:700;color:var(--p3);margin-bottom:4px;
  text-transform:uppercase;letter-spacing:.1em;
}
.product-name{
  font-size:14px;font-weight:500;line-height:1.45;margin-bottom:8px;

}
.product-price-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.product-price{font-size:16px;font-weight:700;color:var(--primary);letter-spacing:-.01em}
.product-compare{font-size:12.5px;text-decoration:line-through;opacity:.32;color:var(--p)}
.product-discount{
  font-size:10.5px;font-weight:800;
  background:rgba(220,38,38,.08);color:#dc2626;
  padding:2px 7px;border-radius:4px;letter-spacing:.02em;
}

/* Cart controls */
.cart-controls-wrap{padding:8px 14px 14px;flex-shrink:0}
.cart-controls{width:100%}
.btn-add{
  width:100%;height:40px;background:var(--primary);color:#fff;border:none;
  border-radius:var(--btn-r);font-size:12.5px;font-weight:700;cursor:pointer;
  font-family:var(--font);letter-spacing:.04em;text-transform:uppercase;

.btn-add:hover{opacity:.88;transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,.18)}
.out-of-stock-label{

}
.cart-qty-row{
  display:flex;align-items:center;height:40px;
  border-radius:var(--btn-r);border:1.5px solid var(--primary);
  overflow:hidden;width:100%;background:#fff;
}
.qty-btn{
  flex:0 0 40px;height:100%;border:none;background:transparent;
  color:var(--primary);font-size:18px;font-weight:300;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background .14s,color .14s;
}
.qty-btn:hover{background:var(--primary);color:#fff}
.qty-value{flex:1;text-align:center;font-size:14px;font-weight:700;color:var(--p);background:transparent;user-select:none;letter-spacing:.02em}

/* In-cart state */

/* ── List View ── */
.list-view .product-card{flex-direction:row;height:132px;align-items:stretch}
.list-view .card-link{flex-direction:row;flex:1;min-width:0}
.list-view .product-img{width:132px;min-width:132px;height:100%;aspect-ratio:unset;flex-shrink:0;border-radius:0}

.list-view .product-name{font-size:15px;-webkit-line-clamp:2;white-space:normal}
.list-view .product-card:hover{transform:none;box-shadow:0 6px 28px rgba(0,0,0,.09)}
.list-view .cart-controls-wrap{padding:0 16px;display:flex;align-items:center;flex-shrink:0;width:174px;border-left:1px solid var(--border)}

.state-box{

<script>
/* ═══════════════════════════════════════
   SLUG + URL
═══════════════════════════════════════ */
const _params = new URLSearchParams(location.search)

function resolveSlug() {
  const p = _params.get('store'); if (p) return p
  const h = location.hostname
  const SVC = ['ekartv1','ekart','ekarts','apiv2','storefront','ai-ekart-storefront.pages.dev','localhost','127.0.0.1']
  if (h.endsWith('.aasaitech.in')) {
    const sub = h.slice(0, h.indexOf('.aasaitech.in'))
    const fp = sub.split('.')[0]
    if (!SVC.includes(fp)) return fp
    return null
  }
  if (!SVC.some(d => h.includes(d))) return h
  return null
}

const slug = resolveSlug()
const _isCustom = !_params.get('store') && slug !== null
const storeUrl = (page, extra='') => _isCustom
  ? `${page}${extra ? '?' + extra : ''}`
  : `${page}?store=${slug}${extra ? '&' + extra : ''}`
const gotoCart = () => location.href = storeUrl('cart.html')

const API = 'https://apiv2.aasaitech.in'

/* ═══════════════════════════════════════
   STATE
═══════════════════════════════════════ */
let currency = sessionStorage.getItem('ekart_currency') || '₹'
let storeConfig = {}
let allProducts = []
let filteredProducts = []
let categories = []

let currentCat = _params.get('category') || '_all'
let currentSearch = _params.get('search') || ''
let currentSort = _params.get('sort') || 'featured'
let currentView = 'grid'
let priceMin = _params.get('min') ? parseFloat(_params.get('min')) : null
let priceMax = _params.get('max') ? parseFloat(_params.get('max')) : null

const PAGE_SIZE = 24
let displayedCount = PAGE_SIZE

/* ═══════════════════════════════════════
   THEME
═══════════════════════════════════════ */
function isColorDark(hex) {
  const c = (hex||'').replace('#','')
  if (c.length !== 6) return false
  const r=parseInt(c.slice(0,2),16),g=parseInt(c.slice(2,4),16),b=parseInt(c.slice(4,6),16)
  return (r*299+g*587+b*114)/1000 < 145
}
function parseThemeSettings(raw) {
  if (!raw || typeof raw !== 'object') return {}
  let doc = raw
  if (raw.published && typeof raw.published === 'object') doc = raw.published
  else if (raw.draft && typeof raw.draft === 'object') doc = raw.draft
  const s = doc.settings || doc
  let navBg = null, navText = null
  for (const sec of (doc.sections||[])) {
    const t = (sec.type||'').toLowerCase()
    if (t==='navbar'||t==='navigation'||t==='nav'||t==='header') {
      const sd = sec.data||sec.settings||{}
      navBg  = sd.bgColor||sd.bg_color||sd.background||null
      navText = sd.textColor||sd.text_color||sd.linkColor||null
      break
    }
  }
  return {
    primaryColor: s.primary_color||s.primaryColor||null,
    bgColor:      s.secondary_color||s.bgColor||s.bg_color||null,
    textColor:    s.accent_color||s.textColor||null,
    font:         s.font_heading||s.fontHeading||s.font||null,
    radius:       s.radius||s.border_radius||null,
    buttonStyle:  s.button_style||s.buttonStyle||null,
    navBg:        s.nav_bg||s.navBg||navBg||null,
    navTextColor: s.nav_text_color||s.navTextColor||navText||null,
  }
}
function applyCSSVars(cfg, theme) {
  const R = document.documentElement
  const primary = theme.primaryColor || cfg.brand_color || null
  if (primary) { R.style.setProperty('--primary',primary); R.style.setProperty('--accent',primary) }
  if (theme.bgColor) { R.style.setProperty('--bg',theme.bgColor); document.body.style.background=theme.bgColor }
  if (theme.textColor) R.style.setProperty('--p',theme.textColor)
  if (theme.radius) {
    const r = typeof theme.radius==='number'?`${theme.radius}px`:String(theme.radius).includes('px')?theme.radius:`${theme.radius}px`
    R.style.setProperty('--radius',r)
    const btnR = theme.buttonStyle==='pill'?'999px':theme.buttonStyle==='square'?'4px':r
    R.style.setProperty('--btn-r',btnR)
  }
  if (theme.font && theme.font !== 'DM Sans') {
    const fid='gf-'+theme.font.replace(/\s+/g,'-')
    if (!document.getElementById(fid)) {
      const l=document.createElement('link');l.id=fid;l.rel='stylesheet'
      l.href=`https://fonts.googleapis.com/css2?family=${encodeURIComponent(theme.font)}:wght@400;500;600;700;800&display=swap`
      document.head.appendChild(l)

    R.style.setProperty('--font',`'${theme.font}',system-ui,sans-serif`)

  }
  if (theme.navBg) {
    R.style.setProperty('--navbar-bg',theme.navBg)
    const nav = document.getElementById('pageNav')
    if (nav) {
      nav.style.background = theme.navBg
      nav.style.borderBottomColor = isColorDark(theme.navBg)?'rgba(255,255,255,.1)':'rgba(0,0,0,.07)'
      const tc = theme.navTextColor||(isColorDark(theme.navBg)?'#ffffff':'')
      if (tc) { nav.style.color=tc; nav.querySelectorAll('a,span,button').forEach(el=>{if(!el.style.color)el.style.color=tc}) }
    }
  }
}

/* ═══════════════════════════════════════
   CART
═══════════════════════════════════════ */
const getCart  = () => JSON.parse(localStorage.getItem('cart_'+slug)||'[]')
const saveCart = c  => localStorage.setItem('cart_'+slug, JSON.stringify(c))
const getQty   = id => { const i=getCart().find(x=>x.product_id===id&&!x.variant); return i?i.qty:0 }

function updateCartUI() {
  const cart = getCart()
  const qty  = cart.reduce((s,x)=>s+x.qty,0)
  const amt  = cart.reduce((s,x)=>s+x.price*x.qty,0)
  const el   = document.getElementById('cartCount')
  el.textContent = qty
  el.className = 'nav-cart-count' + (qty>0?' on':'')
  const bar = document.getElementById('cartBar')
  if (qty > 0) {
    bar.classList.add('on'); document.body.classList.add('cart-open')
    document.getElementById('cbarQty').textContent = `${qty} item${qty!==1?'s':''}`
    document.getElementById('cbarTotal').textContent = `${currency}${amt.toFixed(2)}`
  } else {
    bar.classList.remove('on'); document.body.classList.remove('cart-open')
  }
}

function handleCartBtn(btn) {
  const pid=btn.dataset.pid, action=btn.dataset.action
  if (!pid) return
  const el=document.querySelector(`.cart-controls[data-pid="${pid}"]`)
  if (!el) return
  const p={id:pid,name:el.dataset.name,price:parseFloat(el.dataset.price),image:el.dataset.image}
  if (action==='add'||action==='inc') incCart(p.id,p.name,p.price,p.image)
  else if (action==='dec') decCart(p.id)
}

function incCart(id,name,price,image){
  const cart=getCart(), i=cart.find(x=>x.product_id===id&&!x.variant)
  if (i) i.qty++; else cart.push({product_id:id,name,price,image,qty:1})
  saveCart(cart); updateCartUI(); refreshCard(id); showToast('Added to cart ✓')
}
function decCart(id){
  const cart=getCart(), idx=cart.findIndex(x=>x.product_id===id&&!x.variant)
  if (idx!==-1) { if(cart[idx].qty>1)cart[idx].qty--; else cart.splice(idx,1); saveCart(cart); updateCartUI(); refreshCard(id) }
}

function cardClick(e,pid){
  if (e.target.closest('button,.wish-btn,.cart-controls,.cart-controls-wrap,.card-atc-overlay')) return
  location.href = storeUrl('product.html',`id=${pid}`)
}

function refreshCard(id) {
  const qty = getQty(id)
  document.querySelectorAll(`.cart-controls[data-pid="${id}"]`).forEach(ctrl => {
    const card = ctrl.closest('.product-card')
    const label = (card&&card.dataset.btnLabel)||'Add to Cart'
    if (qty===0) {
      ctrl.innerHTML=`<button class="btn-add" data-action="add" data-pid="${id}" onclick="event.preventDefault();event.stopPropagation();handleCartBtn(this)"><span style="font-size:13px">🛒</span>${esc(label)}</button>`
      if (card) { card.classList.remove('in-cart'); const isListV=card.closest('.list-view'); if(!isListV){let ov=card.querySelector('.card-atc-overlay');if(!ov){const iw=card.querySelector('.product-img');if(iw){ov=document.createElement('div');ov.className='card-atc-overlay';ov.innerHTML=`<button class="card-atc-btn" data-action="add" data-pid="${id}" onclick="event.preventDefault();event.stopPropagation();handleCartBtn(this)">🛒 ${esc(label)}</button>`;iw.appendChild(ov)}}}}
    } else {
      ctrl.innerHTML=`<div class="cart-qty-row"><button class="qty-btn" data-action="dec" data-pid="${id}" onclick="event.preventDefault();event.stopPropagation();handleCartBtn(this)">−</button><span class="qty-value">${qty}</span><button class="qty-btn" data-action="inc" data-pid="${id}" onclick="event.preventDefault();event.stopPropagation();handleCartBtn(this)">+</button></div>`
      if (card) { card.classList.add('in-cart'); const ov=card.querySelector('.card-atc-overlay'); if(ov)ov.remove() }
    }
  })
}

function toggleWish(pid,btn){
  const key=`wish_${slug}`,list=JSON.parse(localStorage.getItem(key)||'[]'),idx=list.indexOf(pid)
  if(idx===-1){list.push(pid);btn.textContent='♥';btn.classList.add('wished');showToast('Saved to wishlist')}
  else{list.splice(idx,1);btn.textContent='♡';btn.classList.remove('wished');showToast('Removed from wishlist')}
  localStorage.setItem(key,JSON.stringify(list))
}
function restoreWishlist(){
  const list=JSON.parse(localStorage.getItem(`wish_${slug}`)||'[]')
  list.forEach(pid=>{
    document.querySelectorAll('.product-card').forEach(card=>{
      const cc=card.querySelector(`.cart-controls[data-pid="${pid}"]`)
      if(cc){const wb=card.querySelector('.wish-btn');if(wb){wb.textContent='♥';wb.classList.add('wished')}}
    })

}

/* ═══════════════════════════════════════
   RENDER CARD
═══════════════════════════════════════ */
const discPct = p => p.compare_at_price&&p.compare_at_price>p.price ? Math.round((1-p.price/p.compare_at_price)*100) : 0
const isOOS   = p => p.track_inventory && p.stock_qty <= 0

const colorPairs=[['#e8f4f8','#b2d8e8'],['#f8f0e8','#e8c8a8'],['#f0f8e8','#c8e8b0'],['#f8e8f0','#e8b0c8'],['#f0e8f8','#c8b0e8'],['#f8f8e8','#e8e8a0']]

function getBadge(p){
  const bt=p.badge_text||p.badge||''
  if(bt){const bl=bt.toLowerCase(),c=bl.includes('best')||bl.includes('seller')?'badge-bestseller':bl.includes('new')?'badge-new':bl.includes('trend')?'badge-trending':bl.includes('hot')?'badge-hot':bl.includes('sale')?'badge-sale':'badge-custom';return`<div class="product-badge ${c}">${esc(bt)}</div>`}
  const d=discPct(p);if(d>=5)return`<div class="product-badge badge-discount">−${d}%</div>`;return''
}

function renderCard(p, idx) {
  const oos = isOOS(p), qty = getQty(p._id), imgUrl = p.images?.[0]||''
  const d = discPct(p)
  const pid = p._id
  const label = 'Add to Cart'
  const cIdx = (p.name||'').split('').reduce((s,c)=>s+c.charCodeAt(0),0)%colorPairs.length
  const [bg1,bg2c] = colorPairs[cIdx]
  const gradBg = imgUrl?'':`background:linear-gradient(135deg,${bg1},${bg2c});`
  const imgTag = imgUrl?`<img src="${imgUrl}" alt="${esc(p.name)}" loading="lazy" onerror="this.closest('.product-img').classList.add('img-err')">`:''
  const badge = getBadge(p)
  const wish = `<button class="wish-btn" onclick="event.preventDefault();event.stopPropagation();toggleWish('${pid}',this)">♡</button>`
  const ctrlData = `data-pid="${pid}" data-name="${esc(p.name)}" data-price="${p.price}" data-image="${esc(imgUrl)}"`
  const isListV = currentView === 'list'
  const delay = Math.min(idx * 0.04, 0.4)

  let ctrlInner
  if (oos) ctrlInner = `<span class="out-of-stock-label">Out of stock</span>`
  else if (qty>0) ctrlInner = `<div class="cart-qty-row"><button class="qty-btn" data-action="dec" data-pid="${pid}" onclick="event.preventDefault();event.stopPropagation();handleCartBtn(this)">−</button><span class="qty-value">${qty}</span><button class="qty-btn" data-action="inc" data-pid="${pid}" onclick="event.preventDefault();event.stopPropagation();handleCartBtn(this)">+</button></div>`
  else ctrlInner = `<button class="btn-add" data-action="add" data-pid="${pid}" onclick="event.preventDefault();event.stopPropagation();handleCartBtn(this)"><span style="font-size:13px">🛒</span>${esc(label)}</button>`

  const hoverAtc = (oos||qty>0||isListV)?'':`<div class="card-atc-overlay"><button class="card-atc-btn" data-action="add" data-pid="${pid}" onclick="event.preventDefault();event.stopPropagation();handleCartBtn(this)">🛒 ${esc(label)}</button></div>`

  return `<div class="product-card${qty>0?' in-cart':''}" data-pid="${pid}" data-btn-label="${esc(label)}" onclick="cardClick(event,'${pid}')" style="animation-delay:${delay}s">
    <div class="card-link">
      <div class="product-img" style="${gradBg}">
        ${badge}${wish}${imgTag}
        <div class="img-fallback">🛍️</div>
        ${hoverAtc}
      </div>
      <div class="product-info">
        ${p.category_name?`<div class="product-cat">${esc(p.category_name)}</div>`:''}
        <div class="product-name">${esc(p.name)}</div>
        <div class="product-price-row">
          <span class="product-price">${currency}${p.price.toFixed(2)}</span>
          ${p.compare_at_price?`<span class="product-compare">${currency}${p.compare_at_price.toFixed(2)}</span>`:''}
          ${d?`<span class="product-discount">−${d}%</span>`:''}
        </div>
      </div>
    </div>
    <div class="cart-controls-wrap"><div class="cart-controls" ${ctrlData}>${ctrlInner}</div></div>
  </div>`
}

/* ═══════════════════════════════════════
   FILTER + SORT ENGINE
═══════════════════════════════════════ */
function runFilter() {
  let f = [...allProducts]

  if (currentCat && currentCat !== '_all') {
    f = f.filter(p => (p.category_name||'').toLowerCase() === currentCat.toLowerCase())
  }
  if (currentSearch.trim()) {
    const q = currentSearch.toLowerCase()
    f = f.filter(p => (p.name||'').toLowerCase().includes(q) || (p.category_name||'').toLowerCase().includes(q) || (p.description||'').toLowerCase().includes(q))
  }
  if (priceMin !== null) f = f.filter(p => p.price >= priceMin)
  if (priceMax !== null) f = f.filter(p => p.price <= priceMax)

  switch (currentSort) {
    case 'price_asc':  f.sort((a,b)=>a.price-b.price); break
    case 'price_desc': f.sort((a,b)=>b.price-a.price); break
    case 'name_asc':   f.sort((a,b)=>(a.name||'').localeCompare(b.name||'')); break
    case 'newest':     f.sort((a,b)=>new Date(b.created_at||0)-new Date(a.created_at||0)); break
    case 'discount':   f.sort((a,b)=>discPct(b)-discPct(a)); break
    default: break
  }

  filteredProducts = f
  displayedCount = PAGE_SIZE
  renderGrid()
  updatePageMeta()
  updateActiveFiltersUI()
  updateURL()
}

function renderGrid() {
  const grid = document.getElementById('productsGrid')
  const slice = filteredProducts.slice(0, displayedCount)

  if (!filteredProducts.length) {
    grid.innerHTML = `<div class="state-box"><div class="state-icon">🔍</div><div class="state-title">No products found</div><div class="state-sub">Try adjusting your filters or search term.</div><button class="state-btn" onclick="clearAllFilters()">Clear Filters</button></div>`
    document.getElementById('loadMoreWrap').style.display = 'none'
    return
  }

  grid.innerHTML = slice.map((p, i) => renderCard(p, i)).join('')
  if (currentView === 'list') grid.classList.add('list-view')
  else grid.classList.remove('list-view')

  const wrap = document.getElementById('loadMoreWrap')
  if (filteredProducts.length > displayedCount) {
    wrap.style.display = 'flex'
    const btn = document.getElementById('loadMoreBtn')
    btn.disabled = false
    btn.classList.remove('loading')
    document.querySelector('.load-more-text').textContent = `Load More (${filteredProducts.length - displayedCount} remaining)`
  } else {
    wrap.style.display = 'none'
  }

  restoreWishlist()
  updateCartUI()
}

function loadMore() {
  const btn = document.getElementById('loadMoreBtn')
  btn.classList.add('loading'); btn.disabled = true
  setTimeout(() => {
    displayedCount += PAGE_SIZE
    renderGrid()
  }, 400)
}

function updatePageMeta() {
  const count = filteredProducts.length
  const catLabel = currentCat === '_all' ? 'All Products' : currentCat
  const h1 = document.getElementById('heroTitle')
  if (currentCat === '_all') h1.innerHTML = '<em>All</em> Products'
  else h1.innerHTML = `<em>${esc(catLabel)}</em>`
  document.getElementById('bcCurrent').textContent = catLabel
  document.getElementById('heroMeta').innerHTML = `<span>${count} product${count!==1?'s':''}</span>${currentSearch?' matching "'+esc(currentSearch)+'"':''}`
  document.getElementById('resultCount').textContent = count + ' products'

  let fc = 0
  if (currentCat !== '_all') fc++
  if (currentSearch) fc++
  if (priceMin !== null || priceMax !== null) fc++
  const badge = document.getElementById('filterBadge')
  badge.textContent = fc
  badge.style.display = fc > 0 ? 'inline-flex' : 'none'
}

function updateURL() {
  if (!history.pushState) return
  const p = new URLSearchParams()
  if (!_isCustom && slug) p.set('store', slug)
  if (currentCat !== '_all') p.set('category', currentCat)
  if (currentSearch) p.set('search', currentSearch)
  if (currentSort !== 'featured') p.set('sort', currentSort)
  if (priceMin !== null) p.set('min', priceMin)
  if (priceMax !== null) p.set('max', priceMax)
  const qs = p.toString()
  history.replaceState(null, '', qs ? '?'+qs : location.pathname)
}

function setCat(cat) {
  currentCat = cat
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.toggle('active', b.dataset.cat === cat))
  document.querySelectorAll('.cat-pill').forEach(b => b.classList.toggle('active', b.dataset.cat === cat))
  document.querySelectorAll('.mob-cat-btn').forEach(b => b.classList.toggle('active', b.dataset.cat === cat))
  runFilter()
}

function setSort(val) {
  currentSort = val
  document.getElementById('sortSelect').value = val
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.toggle('active', b.dataset.sort === val))
  document.querySelectorAll('.mob-sort-opt').forEach(b => b.classList.toggle('active', b.dataset.sort === val))
  runFilter()
}

function setView(v) {
  currentView = v
  const grid = document.getElementById('productsGrid')
  grid.classList.toggle('list-view', v==='list')
  document.getElementById('viewGrid').classList.toggle('active', v==='grid')
  document.getElementById('viewList').classList.toggle('active', v==='list')
  renderGrid()
}

let _searchTimer
function onSearchInput(val) {
  document.getElementById('searchClear').classList.toggle('on', val.length > 0)
  clearTimeout(_searchTimer)
  _searchTimer = setTimeout(() => { currentSearch = val.trim(); runFilter() }, 320)
}

function clearSearch() {
  document.getElementById('searchInput').value = ''
  document.getElementById('searchClear').classList.remove('on')
  currentSearch = ''
  runFilter()
}

function applyPriceFilter() {
  const minVal = document.getElementById('priceMin').value.trim()
  const maxVal = document.getElementById('priceMax').value.trim()
  priceMin = minVal ? parseFloat(minVal) : null
  priceMax = maxVal ? parseFloat(maxVal) : null
  runFilter()
}

function clearAllFilters() {
  currentCat = '_all'; currentSearch = ''; currentSort = 'featured'
  priceMin = null; priceMax = null
  document.getElementById('searchInput').value = ''
  document.getElementById('searchClear').classList.remove('on')
  document.getElementById('priceMin').value = ''
  document.getElementById('priceMax').value = ''
  document.getElementById('sortSelect').value = 'featured'
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.toggle('active',b.dataset.cat==='_all'))
  document.querySelectorAll('.cat-pill').forEach(b=>b.classList.toggle('active',b.dataset.cat==='_all'))
  document.querySelectorAll('.sort-btn').forEach(b=>b.classList.toggle('active',b.dataset.sort==='featured'))

}

   ACTIVE FILTERS UI
═══════════════════════════════════════ */
function updateActiveFiltersUI() {
  const wrap = document.getElementById('activeFiltersWrap')
  const tags = []
  if (currentCat !== '_all') tags.push({ label: currentCat, action: ()=>setCat('_all') })
  if (currentSearch) tags.push({ label: `"${currentSearch}"`, action: clearSearch })
  if (priceMin !== null || priceMax !== null) {
    const label = priceMin!=null && priceMax!=null ? `${currency}${priceMin}–${currency}${priceMax}` : priceMin!=null ? `≥${currency}${priceMin}` : `≤${currency}${priceMax}`
    tags.push({ label, action: ()=>{ priceMin=null;priceMax=null;document.getElementById('priceMin').value='';document.getElementById('priceMax').value='';runFilter() } })
  }
  if (!tags.length) { wrap.innerHTML=''; return }
  wrap.innerHTML = `<div class="active-filters">
    ${tags.map((t,i)=>`<button class="filter-tag" onclick="(${t.action.toString()})()">${esc(t.label)} <span>×</span></button>`).join('')}
    ${tags.length>1?`<button class="clear-all-btn" onclick="clearAllFilters()">Clear all</button>`:''}
  </div>`
}

function buildMobCatList() {
  const ml = document.getElementById('mobCatList')
  ml.innerHTML = `<button class="mob-cat-btn${currentCat==='_all'?' active':''}" data-cat="_all" onclick="setCat('_all');closeMobDrawer()"><span>All Products</span><span class="mob-cat-count">${allProducts.length}</span></button>`
  + categories.map(c => {
    const cnt = allProducts.filter(p=>(p.category_name||'').toLowerCase()===c.name.toLowerCase()).length
    return `<button class="mob-cat-btn${currentCat.toLowerCase()===c.name.toLowerCase()?' active':''}" data-cat="${esc(c.name)}" onclick="setCat('${esc(c.name)}');closeMobDrawer()"><span>${esc(c.name)}</span><span class="mob-cat-count">${cnt}</span></button>`
  }).join('')
}

function buildMobSortList() {
  const ml = document.getElementById('mobSortList')
  ml.innerHTML = SORT_OPTIONS.map(o => `<button class="mob-sort-opt${currentSort===o.val?' active':''}" data-sort="${o.val}" onclick="setSort('${o.val}')">${o.label}</button>`).join('')
}

/* ═══════════════════════════════════════
   ACCOUNT
═══════════════════════════════════════ */
function initAcct() {
  const tok  = slug && localStorage.getItem(`cust_token_${slug}`)
  const name = slug && localStorage.getItem(`cust_name_${slug}`)
  const lbl  = document.getElementById('acctLabel')
  if (lbl) lbl.textContent = (tok && name) ? name.split(' ')[0] : 'Login'
}
function handleAcct() {
  const tok = slug && localStorage.getItem(`cust_token_${slug}`)
  location.href = tok ? storeUrl('customer-account.html') : storeUrl('customer-login.html')
}

/* ═══════════════════════════════════════
   UTILS
═══════════════════════════════════════ */
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')
function showToast(msg) {
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('on')
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('on'),2400)
}
function showSkeletons() {
  const grid = document.getElementById('productsGrid')
  grid.innerHTML = Array(12).fill(0).map(()=>`<div class="product-card skeleton" style="aspect-ratio:3/4;min-height:200px"></div>`).join('')
}

/* ═══════════════════════════════════════
   INIT
═══════════════════════════════════════ */
async function init() {
  if (!slug) {
    document.getElementById('productsGrid').innerHTML = `<div class="state-box"><div class="state-icon">🏪</div><div class="state-title">Store not found</div><div class="state-sub">Add ?store=your-slug to the URL</div></div>`
    return
  }

  document.getElementById('navLogo').href = storeUrl('index.html')
  document.getElementById('bcHome').href  = storeUrl('index.html')

  showSkeletons()
  initAcct()

  if (currentSearch) {
    document.getElementById('searchInput').value = currentSearch
    document.getElementById('searchClear').classList.add('on')
  }
  if (priceMin !== null) document.getElementById('priceMin').value = priceMin
  if (priceMax !== null) document.getElementById('priceMax').value = priceMax
  document.getElementById('sortSelect').value = currentSort

  try {
    const [cfgRes, themeRes, prodsRes, catsRes] = await Promise.allSettled([
      fetch(`${API}/shop/${slug}/config`).then(r=>r.json()),
      fetch(`${API}/shop/${slug}/theme`).then(r=>r.json()),
      fetch(`${API}/shop/${slug}/products?page=1&limit=500`).then(r=>r.json()),
      fetch(`${API}/shop/${slug}/categories`).then(r=>r.json()),
    ])

    if (cfgRes.status==='fulfilled' && !cfgRes.value.error) {
      storeConfig = cfgRes.value
      document.title = `Products — ${storeConfig.name||'Store'}`
      if (storeConfig.currency==='USD') currency='$'
      else if (storeConfig.currency==='EUR') currency='€'
      sessionStorage.setItem('ekart_store', slug)
      sessionStorage.setItem('ekart_currency', currency)
      sessionStorage.setItem('ekart_store_name', storeConfig.name||'')
      document.getElementById('mobDrawerLogo').textContent = storeConfig.name||'Filters'
      renderNavLogo(storeConfig)
    }

    if (themeRes.status==='fulfilled') applyCSSVars(storeConfig, parseThemeSettings(themeRes.value))
    else if (storeConfig.brand_color) { document.documentElement.style.setProperty('--primary',storeConfig.brand_color); document.documentElement.style.setProperty('--accent',storeConfig.brand_color) }

    if (prodsRes.status==='fulfilled') {
      allProducts = prodsRes.value.products || prodsRes.value.items || prodsRes.value || []
    }

    if (catsRes.status==='fulfilled') {
      categories = Array.isArray(catsRes.value) ? catsRes.value : []
    }

    if (!categories.length && allProducts.length) {
      const names = [...new Set(allProducts.map(p=>p.category_name).filter(Boolean))]
      categories = names.map(n => ({ name:n, product_count: allProducts.filter(p=>p.category_name===n).length }))
    }

    buildSidebarCats()
    buildCatPills()
    buildSortList()
    buildMobCatList()
    buildMobSortList()
    runFilter()
    updateCartUI()
    initAcct()

  } catch(e) {
    document.getElementById('productsGrid').innerHTML = `<div class="state-box"><div class="state-icon">😕</div><div class="state-title">Could not load products</div><div class="state-sub">${esc(e.message)}</div><button class="state-btn" onclick="location.reload()">Try Again</button></div>`
  }
}

init()
</script>
</body>
</html>
