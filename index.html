<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════════════
   RESET & DESIGN TOKENS
═══════════════════════════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --p:#0f0f0f;--p2:#525252;--p3:#a3a3a3;
  --bg:#fafafa;--bg2:#f5f5f5;--bg3:#e8e8e8;
  --border:#e8e8e8;
  --primary:#111111;
  --navbar-h:62px;
  --cols:4;
  --font:'DM Sans',system-ui,sans-serif;
  --font-display:'DM Serif Display',serif;
  --ease:cubic-bezier(.4,0,.2,1);
  --ease-out:cubic-bezier(0,0,.2,1);
  --ease-spring:cubic-bezier(.34,1.56,.64,1);
  --radius:12px;
  --btn-r:8px;
  --card-radius:12px;
  --card-aspect:3/4;
  --card-gap:14px;
  --card-name-fs:14px;
  --card-price-fs:16px;
  --card-cat-fs:11px;
  --card-btn-fs:13px;
  --card-info-pad:10px 12px 5px;
  --card-btn-pad:6px 12px 12px;
  --card-btn-h:38px;
  --card-bg:#ffffff;
  --card-price-color:#111111;
  --sh0:0 1px 2px rgba(0,0,0,.04);
  --sh1:0 4px 16px rgba(0,0,0,.06),0 1px 4px rgba(0,0,0,.03);
  --sh2:0 16px 48px rgba(0,0,0,.10),0 4px 16px rgba(0,0,0,.05);
  --sh3:0 32px 80px rgba(0,0,0,.14),0 8px 24px rgba(0,0,0,.07);
  --card-shadow:0 1px 3px rgba(0,0,0,.04),0 2px 8px rgba(0,0,0,.03);
  --card-shadow-hover:0 8px 32px rgba(0,0,0,.09),0 2px 10px rgba(0,0,0,.04);
}

html{scroll-behavior:smooth}
body{
  font-family:var(--font);
  background:var(--bg);
  color:var(--p);
  -webkit-font-smoothing:antialiased;
  line-height:1.5;
  transition:padding-bottom .3s var(--ease);
}
img{display:block;max-width:100%}
button,input,select,textarea{font-family:inherit}
a{color:inherit;text-decoration:none}
.hidden{display:none!important}

/* ── PAGE SECTIONS ── */
#page-sections{display:block}
#page-sections > *{display:block;width:100%;margin:0}

/* ── LOADER ── */
#loader{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;transition:opacity .4s var(--ease)}
#loader.out{opacity:0;pointer-events:none}
.ld-ring{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--p);border-radius:50%;animation:ldSpin .7s linear infinite}
.ld-text{font-size:11.5px;color:var(--p3);letter-spacing:.06em;font-weight:500}
@keyframes ldSpin{to{transform:rotate(360deg)}}

.announcement-bar{
  background:var(--p);color:#fff;
  text-align:center;padding:10px 48px;
  font-size:13.5px;font-weight:500;letter-spacing:.04em;
  position:relative;
  z-index:100;
  display:flex;align-items:center;justify-content:center;gap:12px;flex-wrap:wrap;
}
.ann-close{background:none;border:none;color:rgba(255,255,255,.5);cursor:pointer;font-size:14px;padding:0 4px;line-height:1;flex-shrink:0;position:absolute;right:16px;transition:color .15s}
.ann-close:hover{color:#fff}
.ann-link{color:rgba(255,255,255,.75);text-decoration:underline;font-size:11.5px;white-space:nowrap}

/* ── FALLBACK HEADER ── */
#origHeader{background:rgba(250,250,250,.96);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid rgba(0,0,0,.07);position:sticky;top:0;z-index:200}
.hdr-inner{max-width:1440px;margin:0 auto;padding:0 40px;height:var(--navbar-h);display:flex;align-items:center;gap:32px}
.hdr-logo{font-family:var(--font-display);font-size:20px;font-weight:400;letter-spacing:-.01em;color:var(--p);white-space:nowrap;display:flex;align-items:center;gap:10px;flex-shrink:0}
.hdr-logo img{height:28px;object-fit:contain;border-radius:5px}
.hdr-nav{display:flex;align-items:center;gap:28px;flex:1;justify-content:center}
.hdr-nav a{font-size:13px;font-weight:500;color:var(--p2);transition:color .15s;white-space:nowrap}
.hdr-nav a:hover{color:var(--p)}
.hdr-right{display:flex;align-items:center;gap:8px;flex-shrink:0;margin-left:auto}
.hdr-icon-btn{width:36px;height:36px;border-radius:8px;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--p2);transition:background .15s,color .15s}
.hdr-icon-btn:hover{background:var(--bg2);color:var(--p)}
#payBadge{display:none;padding:4px 10px;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:6px;font-size:11px;font-weight:600;color:#16a34a;align-items:center;gap:4px}

.nav-acct-inject{display:flex;align-items:center;flex-shrink:0}
.acct-wrap{display:flex;align-items:center;gap:8px}

.acct-btn-guest{
  display:inline-flex;align-items:center;gap:7px;
  height:38px;padding:0 18px;
  background:rgba(255,255,255,.14);
  border:1.5px solid rgba(255,255,255,.45);
  color:currentColor;
  border-radius:100px;
  font-size:13px;font-weight:600;letter-spacing:.01em;
  cursor:pointer;white-space:nowrap;font-family:inherit;
  transition:background .2s,border-color .2s,transform .15s;
  text-decoration:none;
}
.acct-btn-guest:hover{
  background:rgba(255,255,255,.26);
  border-color:rgba(255,255,255,.75);
  transform:translateY(-1px);
}
.acct-btn-guest svg{opacity:.85;flex-shrink:0}

.acct-btn-user{
  display:inline-flex;align-items:center;gap:9px;
  height:38px;padding:0 14px 0 5px;
  background:rgba(255,255,255,.14);
  border:1.5px solid rgba(255,255,255,.35);
  color:currentColor;
  border-radius:100px;
  font-size:13px;font-weight:600;
  cursor:pointer;white-space:nowrap;font-family:inherit;
  transition:background .2s,transform .15s;
  text-decoration:none;
}
.acct-btn-user:hover{
  background:rgba(255,255,255,.26);
  transform:translateY(-1px);
}
.acct-avatar{
  width:28px;height:28px;border-radius:50%;
  background:rgba(255,255,255,.92);
  color:#111;
  font-size:11px;font-weight:800;letter-spacing:-.5px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  box-shadow:0 1px 4px rgba(0,0,0,.15);
}

.hdr-cart-btn{
  display:inline-flex;align-items:center;gap:8px;
  height:38px;padding:0 18px;
  background:rgba(255,255,255,.92);
  color:#111;
  border:none;border-radius:100px;
  font-size:13px;font-weight:700;
  cursor:pointer;white-space:nowrap;font-family:inherit;
  transition:background .2s,transform .15s,box-shadow .2s;
  box-shadow:0 2px 8px rgba(0,0,0,.12);
  position:relative;
}
.hdr-cart-btn:hover{
  background:#fff;
  transform:translateY(-1px);
  box-shadow:0 4px 16px rgba(0,0,0,.16);
}
.hdr-cart-btn svg{flex-shrink:0;opacity:.75}
.cart-badge{
  display:inline-flex;align-items:center;justify-content:center;
  min-width:20px;height:20px;padding:0 5px;
  background:#111;color:#fff;
  font-size:10px;font-weight:800;
  border-radius:100px;
  transition:transform .2s cubic-bezier(.34,1.56,.64,1);
  opacity:0;transform:scale(0);
}
.cart-badge.on{opacity:1;transform:scale(1)}
.cart-label{font-size:13px;font-weight:700;color:#111}

@media(max-width:768px){
  .hdr-inner{padding:0 16px;gap:12px}
  .hdr-nav{display:none}
  .acct-btn-guest .acct-btn-text{display:none}
  .acct-btn-guest{padding:0 11px;width:38px;justify-content:center}
  .acct-btn-user .acct-name-text{display:none}
  .acct-btn-user{padding:0 5px;width:38px;justify-content:center}
  .hdr-cart-btn .cart-label{display:none}
  .hdr-cart-btn{padding:0 11px;width:38px;justify-content:center}
}

/* ── HERO BANNER fallback ── */
#heroBanner{padding:80px 40px;text-align:center;background:var(--bg2);border-bottom:1px solid var(--border);display:none}
#heroBanner.visible{display:block}
#heroBanner h1{font-family:var(--font-display);font-size:clamp(28px,5vw,56px);font-weight:400;letter-spacing:-.02em;margin-bottom:12px;line-height:1.1}
#heroBanner p{font-size:15px;color:var(--p2);max-width:420px;margin:0 auto 28px;line-height:1.7}
.hero-cta{display:inline-flex;align-items:center;gap:8px;padding:12px 26px;background:var(--p);color:#fff;border-radius:var(--btn-r);font-size:14px;font-weight:600;border:none;cursor:pointer;transition:opacity .2s}
.hero-cta:hover{opacity:.85}

/* ═══════════════════════════════════════════════════════════════
   PRODUCTS TOOLBAR
═══════════════════════════════════════════════════════════════ */
.products-toolbar{display:flex;align-items:center;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.ptb-count{font-size:13.5px;font-weight:500;color:var(--p3);white-space:nowrap;flex-shrink:0}
.ptb-filters{display:flex;align-items:center;gap:6px;flex:1;overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none}
.ptb-filters::-webkit-scrollbar{display:none}
.ptb-filter-pill{display:inline-flex;align-items:center;gap:5px;padding:6px 16px;border-radius:999px;border:1.5px solid var(--border);background:#fff;font-size:13px;font-weight:600;color:var(--p2);cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .15s;line-height:1.4}
.ptb-filter-pill:hover{border-color:var(--p);color:var(--p)}
.ptb-filter-pill.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.ptb-right{display:flex;align-items:center;gap:7px;flex-shrink:0;margin-left:auto}
.ptb-search-wrap{position:relative;display:flex;align-items:center}
.ptb-search-icon{position:absolute;left:9px;font-size:12px;color:var(--p3);pointer-events:none}
.ptb-search{height:36px;padding:0 10px 0 30px;border:1.5px solid var(--border);border-radius:8px;background:#fff;font-size:14px;color:var(--p);outline:none;width:155px;transition:border-color .15s,width .2s var(--ease)}
.ptb-search:focus{border-color:var(--primary);width:195px}
.ptb-sort{height:36px;padding:0 28px 0 10px;border:1.5px solid var(--border);border-radius:8px;background:#fff url("data:image/svg+xml,%3Csvg width='9' height='5' viewBox='0 0 9 5' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l3.5 3L8 1' stroke='%23a3a3a3' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E") no-repeat right 10px center;font-size:12.5px;color:var(--p);outline:none;cursor:pointer;appearance:none;-webkit-appearance:none;transition:border-color .15s;white-space:nowrap;font-size:14px}
.ptb-sort:focus{border-color:var(--primary)}
.ptb-view-toggle{display:flex;border:1.5px solid var(--border);border-radius:8px;overflow:hidden;height:34px;flex-shrink:0}
.ptb-view-btn{width:34px;height:100%;border:none;background:transparent;color:var(--p3);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:background .12s,color .12s}
.ptb-view-btn.active{background:var(--bg2);color:var(--p)}
.ptb-view-btn:hover:not(.active){background:var(--bg2);color:var(--p)}
.ptb-view-btn+.ptb-view-btn{border-left:1.5px solid var(--border)}
.products-empty{grid-column:1/-1;padding:56px 16px;text-align:center;color:var(--p3);font-size:14px;font-weight:500}
.products-empty span{display:block;font-size:36px;margin-bottom:10px}

/* ═══════════════════════════════════════════════════════════════
   PRODUCT GRID
═══════════════════════════════════════════════════════════════ */
.featured-section{max-width:1440px;margin:0 auto;box-sizing:border-box}
.products-grid{display:grid;grid-template-columns:repeat(var(--cols,4),1fr);gap:var(--card-gap,14px)}

/* ═══════════════════════════════════════════════════════════════
   PRODUCT CARD
═══════════════════════════════════════════════════════════════ */
.product-card{background:var(--card-bg,#fff);border-radius:var(--card-radius,12px);overflow:hidden;position:relative;cursor:pointer;display:flex;flex-direction:column;border:1px solid var(--border);box-shadow:var(--card-shadow);transition:transform .22s var(--ease),box-shadow .22s var(--ease),border-color .2s;will-change:transform}
.product-card:hover{transform:translateY(-3px);box-shadow:var(--card-shadow-hover);border-color:#d8d8d8}
.card-link{display:flex;flex-direction:column;flex:1;color:inherit;min-width:0;cursor:pointer}

.product-img{width:100%;aspect-ratio:var(--card-aspect,3/4);background:var(--bg2);overflow:hidden;position:relative;flex-shrink:0}
.product-img img{width:100%;height:100%;object-fit:cover;transition:transform .45s var(--ease-out);display:block}
.product-card:hover .product-img img{transform:scale(1.05)}
.img-fallback-icon{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:40px;opacity:.12;pointer-events:none}
.product-img.img-error img{display:none}

.product-badge{position:absolute;top:8px;left:8px;font-size:9.5px;font-weight:700;padding:3px 8px;border-radius:5px;letter-spacing:.04em;z-index:2;line-height:1.4}
.badge-bestseller,.badge-hot{background:#f59e0b;color:#fff}
.badge-new{background:#10b981;color:#fff}
.badge-trending{background:#8b5cf6;color:#fff}
.badge-sale,.badge-discount{background:#ef4444;color:#fff}
.badge-custom{background:var(--primary);color:#fff}

.wish-btn{position:absolute;top:8px;right:8px;width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.94);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;z-index:3;opacity:0;transition:opacity .15s,transform .2s var(--ease-spring),background .15s;box-shadow:0 2px 8px rgba(0,0,0,.10);backdrop-filter:blur(6px)}
.product-card:hover .wish-btn{opacity:1}
.wish-btn.wished{opacity:1;color:#ef4444}
.wish-btn:hover{transform:scale(1.12);background:#fff}

.card-atc-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.24) 0%,transparent 52%);display:flex;align-items:flex-end;justify-content:center;padding-bottom:12px;opacity:0;transition:opacity .18s var(--ease);z-index:4;pointer-events:none}
.product-card:hover .card-atc-overlay{opacity:1;pointer-events:auto}
.card-atc-btn{padding:7px 18px;background:#fff;color:var(--p);border:none;border-radius:999px;font-size:11.5px;font-weight:700;cursor:pointer;font-family:var(--font);transition:background .12s,transform .12s var(--ease-spring),box-shadow .12s;box-shadow:0 3px 14px rgba(0,0,0,.14);white-space:nowrap}
.card-atc-btn:hover{background:var(--bg2);transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.18)}

.product-info{padding:var(--card-info-pad,10px 12px 5px);background:var(--card-bg,#fff);flex:1;min-width:0}
.product-cat{font-size:var(--card-cat-fs,11px);font-weight:600;color:var(--p3);margin-bottom:3px;text-transform:uppercase;letter-spacing:.08em}
.product-name{font-size:var(--card-name-fs,14px);font-weight:600;line-height:1.4;margin-bottom:6px;color:var(--p);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.product-price-row{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.product-price{font-size:var(--card-price-fs,16px);font-weight:700;color:var(--card-price-color,var(--primary))}
.product-compare{font-size:13px;text-decoration:line-through;opacity:.36;color:var(--p)}
.product-discount{font-size:11px;font-weight:700;background:rgba(239,68,68,.09);color:#ef4444;padding:2px 6px;border-radius:4px}

.cart-controls-wrap{padding:var(--card-btn-pad,6px 12px 12px);background:var(--card-bg,#fff);flex-shrink:0}
.cart-controls{width:100%}
.btn-add{width:100%;height:var(--card-btn-h,38px);background:var(--primary);color:#fff;border:none;border-radius:var(--btn-r,8px);font-size:var(--card-btn-fs,11.5px);font-weight:600;cursor:pointer;font-family:var(--font);letter-spacing:.02em;display:flex;align-items:center;justify-content:center;gap:5px;transition:opacity .15s,transform .15s var(--ease-spring)}
.btn-add:hover{opacity:.88;transform:translateY(-1px)}
.btn-add:active{transform:translateY(0);opacity:1}
.btn-icon{font-size:13px;line-height:1}
.out-of-stock-label{display:flex;align-items:center;justify-content:center;height:var(--card-btn-h,38px);font-size:11.5px;font-weight:600;color:var(--p3);background:var(--bg2);border-radius:var(--btn-r,8px);border:1px solid var(--border);letter-spacing:.03em}
.cart-qty-row{display:flex;align-items:center;height:var(--card-btn-h,38px);border-radius:var(--btn-r,8px);border:1.5px solid var(--primary);overflow:hidden;width:100%;background:#fff}
.qty-btn{flex:0 0 38px;height:100%;border:none;background:transparent;color:var(--primary);font-size:18px;font-weight:400;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .12s,color .12s;flex-shrink:0;line-height:1}
.qty-btn:hover{background:var(--primary);color:#fff}
.qty-value{flex:1;text-align:center;font-size:13px;font-weight:700;color:var(--p);background:transparent;pointer-events:none;user-select:none}

.product-card.in-cart{border-color:var(--primary);border-width:1.5px}
.product-card.in-cart::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--primary);z-index:5}

/* ═══════════════════════════════════════════
   CARD STYLE VARIANTS
═══════════════════════════════════════════ */
[data-style="minimal"].products-grid{gap:10px}
[data-style="minimal"] .product-card{background:transparent;border:1.5px solid var(--border);box-shadow:none}
[data-style="minimal"] .product-card:hover{border-color:var(--primary);transform:none;box-shadow:0 4px 16px rgba(0,0,0,.06)}
[data-style="minimal"] .product-card.in-cart::before{display:none}
[data-style="minimal"] .product-img{border-bottom:1px solid var(--border)}
[data-style="minimal"] .btn-add{background:transparent;color:var(--primary);border:1.5px solid var(--primary)}
[data-style="minimal"] .btn-add:hover{background:var(--primary);color:#fff;opacity:1;transform:none}
[data-style="minimal"] .cart-qty-row{border-color:var(--primary)}

[data-style="bold"] .product-card{border:none;border-top:3px solid var(--primary);box-shadow:0 2px 8px rgba(0,0,0,.05)}
[data-style="bold"] .product-card.in-cart::before{display:none}
[data-style="bold"] .product-card.in-cart{border-top-width:5px}
[data-style="bold"] .product-name{font-weight:700}
[data-style="bold"] .btn-add{font-weight:700;letter-spacing:.03em;text-transform:uppercase;font-size:calc(var(--card-btn-fs) - 0.5px)}

[data-style="elevated"] .product-card{border:none;box-shadow:0 4px 20px rgba(0,0,0,.07)}
[data-style="elevated"] .product-card:hover{transform:translateY(-5px);box-shadow:0 20px 48px rgba(0,0,0,.12)}
[data-style="elevated"] .product-card.in-cart{box-shadow:0 0 0 2px var(--primary),0 4px 20px rgba(0,0,0,.07)}
[data-style="elevated"] .product-card.in-cart::before{display:none}

[data-style="compact"].products-grid{gap:var(--card-gap,8px)}
[data-style="compact"] .product-img{aspect-ratio:1/1}
[data-style="compact"] .product-info{padding:6px 8px 3px}
[data-style="compact"] .product-name{font-size:calc(var(--card-name-fs,12.5px) * 0.86);-webkit-line-clamp:1;margin-bottom:2px}
[data-style="compact"] .product-price{font-size:calc(var(--card-price-fs,14px) * 0.86)}
[data-style="compact"] .product-cat,[data-style="compact"] .product-compare,[data-style="compact"] .product-discount{display:none}
[data-style="compact"] .cart-controls-wrap{padding:3px 8px 8px}
[data-style="compact"] .btn-add{height:calc(var(--card-btn-h,38px) * 0.84);font-size:calc(var(--card-btn-fs,11.5px) * 0.9);border-radius:6px}
[data-style="compact"] .cart-qty-row{height:calc(var(--card-btn-h,38px) * 0.84);border-radius:6px}
[data-style="compact"] .qty-btn{flex:0 0 calc(var(--card-btn-h,38px) * 0.84);font-size:15px}
[data-style="compact"] .qty-value{font-size:11.5px}

[data-style="list"].products-grid{gap:10px}
[data-style="list"] .product-card{flex-direction:row;height:calc(var(--card-btn-h,38px) * 3.7);min-height:120px;max-height:180px;align-items:stretch;border-radius:12px}
[data-style="list"] .card-link{flex-direction:row;flex:1;min-width:0}
[data-style="list"] .product-img{width:calc(var(--card-btn-h,38px) * 3.7);min-width:calc(var(--card-btn-h,38px) * 3.7);max-width:180px;height:100%;aspect-ratio:unset;border-radius:0;flex-shrink:0}
[data-style="list"] .product-info{flex:1;padding:14px 16px;display:flex;flex-direction:column;justify-content:center;border-left:1px solid var(--border);min-width:0}
[data-style="list"] .product-info .product-name{font-size:var(--card-name-fs,14px);-webkit-line-clamp:2;white-space:normal}
[data-style="list"] .product-info .product-price{font-size:var(--card-price-fs,14px)}
[data-style="list"] .product-info .product-cat{font-size:var(--card-cat-fs,9.5px)}
[data-style="list"] .product-card:hover{transform:none;box-shadow:0 6px 24px rgba(0,0,0,.09)}
[data-style="list"] .cart-controls-wrap{padding:0 16px;display:flex;align-items:center;flex-shrink:0;width:168px;border-left:1px solid var(--border)}
[data-style="list"] .cart-controls{width:100%}
[data-style="list"] .btn-add{white-space:nowrap;height:var(--card-btn-h,38px);font-size:var(--card-btn-fs,11.5px)}
[data-style="list"] .cart-qty-row{height:var(--card-btn-h,38px)}
[data-style="list"] .wish-btn{opacity:1}
[data-style="list"] .card-atc-overlay{display:none}
[data-style="list"] .product-card.in-cart::before{display:none}
[data-style="list"] .product-card.in-cart{border-left:3px solid var(--primary)}

[data-style="magazine"].products-grid{gap:12px}
[data-style="magazine"] .product-card:first-child{grid-column:span 2;grid-row:span 2}
[data-style="magazine"] .product-card:first-child .card-link{flex:1;min-height:0}
[data-style="magazine"] .product-card:first-child .product-img{flex:1;min-height:100px;aspect-ratio:unset}
[data-style="magazine"] .product-card:first-child .product-name{font-size:calc(var(--card-name-fs) * 1.3);-webkit-line-clamp:3}
[data-style="magazine"] .product-card:first-child .product-price{font-size:calc(var(--card-price-fs) * 1.2)}
[data-style="magazine"] .product-card:first-child .cart-controls-wrap{padding:8px 16px 16px}

[data-style="overlay"] .product-card{overflow:hidden}
[data-style="overlay"] .product-img{aspect-ratio:var(--card-aspect,3/4)}
[data-style="overlay"] .product-info,[data-style="overlay"] .cart-controls-wrap{display:none}
[data-style="overlay"] .product-card::before{display:none}
[data-style="overlay"] .product-card.in-cart{border:2px solid var(--primary)}

.ov-layer{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(0deg,rgba(0,0,0,.88) 0%,rgba(0,0,0,.42) 52%,transparent 100%);padding:24px 12px 12px;color:#fff;z-index:3}
.ov-name{font-size:var(--card-name-fs,12.5px);font-weight:700;margin-bottom:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.ov-price-row{display:flex;align-items:center;gap:6px;margin-bottom:9px;flex-wrap:wrap}
.ov-price{font-size:var(--card-price-fs,14px);font-weight:700;color:#fff}
.ov-compare{font-size:11.5px;text-decoration:line-through;opacity:.5}
.ov-discount{font-size:9.5px;font-weight:700;background:rgba(239,68,68,.88);padding:2px 7px;border-radius:4px}
.ov-btn{width:100%;height:var(--card-btn-h,38px);display:flex;align-items:center;justify-content:center;gap:5px;background:rgba(255,255,255,.16);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.3);color:#fff;border-radius:var(--btn-r,8px);font-size:var(--card-btn-fs,11.5px);font-weight:700;cursor:pointer;font-family:var(--font);transition:background .15s,transform .12s var(--ease-spring)}
.ov-btn:hover{background:rgba(255,255,255,.26);transform:translateY(-1px)}
.ov-qty-row{display:flex;align-items:center;height:var(--card-btn-h,38px);border-radius:var(--btn-r,8px);overflow:hidden;border:1px solid rgba(255,255,255,.36);width:100%;background:rgba(255,255,255,.1);backdrop-filter:blur(6px)}
.ov-qty-btn{flex:0 0 var(--card-btn-h,38px);height:100%;border:none;background:transparent;color:#fff;font-size:17px;cursor:pointer;font-weight:400;display:flex;align-items:center;justify-content:center;transition:background .12s;flex-shrink:0}
.ov-qty-btn:hover{background:rgba(255,255,255,.2)}
.ov-qty-val{flex:1;text-align:center;font-size:var(--card-btn-fs,11.5px);font-weight:700;color:#fff}

@keyframes shimmer{0%{background-position:-800px 0}100%{background-position:800px 0}}
.skeleton{background:linear-gradient(90deg,#f0f0f0 25%,#f8f8f8 50%,#f0f0f0 75%);background-size:800px 100%;animation:shimmer 1.5s ease-in-out infinite;border-radius:var(--card-radius);border:none;box-shadow:none}
.skeleton *{visibility:hidden}

/* ═══════════════════════════════════════════════════════════════
   CART BAR
═══════════════════════════════════════════════════════════════ */
.cart-bar{
  position:fixed;bottom:0;left:0;right:0;
  height:66px;
  background:var(--p);color:#fff;
  padding:0 40px;
  display:flex;align-items:center;justify-content:space-between;
  z-index:300;
  box-shadow:0 -1px 0 rgba(255,255,255,.05),0 -12px 40px rgba(0,0,0,.22);
  transform:translateY(100%);
  transition:transform .3s var(--ease);
  pointer-events:none;
}
.cart-bar.on{transform:translateY(0);pointer-events:auto}
body.cart-bar-open{padding-bottom:66px}

.cbar-left{display:flex;align-items:center;gap:14px}
.cbar-icon{width:38px;height:38px;border-radius:10px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.cbar-info{display:flex;flex-direction:column;gap:1px}
.cbar-meta{font-size:12px;font-weight:500;color:rgba(255,255,255,.45);letter-spacing:.04em;text-transform:uppercase}
.cbar-total{font-size:18px;font-weight:700;color:#fff;line-height:1.2;letter-spacing:-.01em}
.cbar-actions{display:flex;align-items:center;gap:10px}
.cbar-pill{padding:6px 14px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.12);border-radius:999px;font-size:13.5px;font-weight:600;color:rgba(255,255,255,.75);white-space:nowrap}
.cbar-btn{padding:11px 26px;background:#fff;color:var(--p);border-radius:var(--btn-r);font-size:14.5px;font-weight:700;transition:opacity .15s,transform .15s var(--ease-spring);text-decoration:none;border:none;cursor:pointer;white-space:nowrap;display:inline-flex;align-items:center;gap:6px}
.cbar-btn:hover{opacity:.92;transform:translateY(-1px)}
.cbar-btn::after{content:'→';font-size:14px}

.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(8px);background:rgba(12,12,12,.95);color:#fff;border-radius:10px;padding:10px 20px;font-size:14px;font-weight:500;opacity:0;transition:all .22s var(--ease);z-index:400;white-space:nowrap;pointer-events:none;box-shadow:0 8px 28px rgba(0,0,0,.22);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.07)}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

.tc-navbar{
  width:100%;
  box-sizing:border-box;
  display:flex!important;
  flex-direction:row!important;
  align-items:center!important;
  flex-wrap:nowrap!important;
  gap:0;
  padding:0 40px;
  height:var(--navbar-h);
  min-height:var(--navbar-h);
  max-height:var(--navbar-h);
  overflow:hidden;
  background:rgba(250,250,250,.97);
  backdrop-filter:blur(24px);
  -webkit-backdrop-filter:blur(24px);
  border-bottom:1px solid rgba(0,0,0,.07);
  position:sticky;
  top:0;
  z-index:200;
}

.nav-logo{
  font-family:var(--font-display);
  font-size:20px;
  font-weight:400;
  letter-spacing:-.02em;
  cursor:pointer;
  display:flex;
  flex-direction:row;
  align-items:center;
  gap:9px;
  white-space:nowrap;
  flex-shrink:0;
  line-height:1;
}
.nav-logo span{
  line-height:1;
  display:flex;
  align-items:center;
}
.nav-logo-img{
  height:32px;
  width:auto;
  max-width:120px;
  object-fit:contain;
  border-radius:6px;
  flex-shrink:0;
  display:block;
  vertical-align:middle;
}
.nav-logo-txt{
  font-family:var(--font-display);
  font-size:22px;
  font-weight:400;
  letter-spacing:-.02em;
  line-height:1;
  white-space:nowrap;
}

.nav-links{
  flex:1;
  display:flex;
  flex-direction:row;
  align-items:center;
  justify-content:center;
  gap:28px;
  min-width:0;
  overflow:hidden;
}
.nav-links a{
  font-size:15px;
  font-weight:500;
  white-space:nowrap;
  opacity:.82;
  transition:opacity .15s;
  flex-shrink:0;
  line-height:1;
  display:flex;
  align-items:center;
}
.nav-links a:hover{opacity:1}

.nav-right{
  display:flex;
  flex-direction:row;
  align-items:center;
  gap:8px;
  flex-shrink:0;
  margin-left:auto;
}

.nav-cart-btn{
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:0 20px;
  height:40px;
  border-radius:100px;
  font-size:13.5px;
  font-weight:700;
  border:none;
  cursor:pointer;
  font-family:var(--font);
  text-decoration:none;
  white-space:nowrap;
  line-height:1;
  box-sizing:border-box;
  transition:transform .15s,box-shadow .2s,background .2s;
  background:rgba(255,255,255,.92);
  color:#111;
  box-shadow:0 2px 8px rgba(0,0,0,.12);
}
.nav-cart-btn:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,.16);background:#fff}

.nav-cart-count{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-width:20px;
  height:20px;
  border-radius:100px;
  font-size:10px;
  font-weight:800;
  padding:0 5px;
  background:#111;
  color:#fff;
  transition:transform .2s cubic-bezier(.34,1.56,.64,1);
  line-height:1;
}

.tc-hero{position:relative;overflow:hidden;text-align:center}
.hero-bg-img{position:absolute;inset:0;background-size:cover;background-position:center;z-index:0}
.hero-ov{position:absolute;inset:0;z-index:1}
.hero-content{position:relative;z-index:2}
.tc-hero h1{font-family:var(--font-display);font-size:clamp(28px,5.5vw,64px);font-weight:400;letter-spacing:-.03em;margin-bottom:16px;line-height:1.04}
.tc-hero h1 em{font-style:italic}
.tc-hero p{font-size:18px;max-width:480px;margin:0 auto 32px;line-height:1.75;opacity:.75}
.hero-badge-pill{display:inline-block;background:rgba(255,255,255,.14);backdrop-filter:blur(6px);font-size:11px;font-weight:600;padding:4px 14px;border-radius:999px;margin-bottom:16px;letter-spacing:.04em;border:1px solid rgba(255,255,255,.2)}
.hero-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.btn-cta{display:inline-flex;align-items:center;gap:7px;padding:12px 26px;border-radius:var(--btn-r);font-size:14px;font-weight:600;cursor:pointer;border:none;font-family:var(--font);transition:opacity .2s,transform .15s var(--ease-spring);text-decoration:none}
.btn-cta:hover{opacity:.88;transform:translateY(-1px)}
.btn-cta-ghost{background:rgba(255,255,255,.14);color:#fff;border:1.5px solid rgba(255,255,255,.28);backdrop-filter:blur(6px)}
.btn-cta-ghost:hover{background:rgba(255,255,255,.22);opacity:1}
.tc-hero.hero-dark .btn-cta-ghost{background:rgba(0,0,0,.06);color:var(--p);border-color:rgba(0,0,0,.14)}
.tc-hero.hero-dark p{color:var(--p2)}
.tc-hero.hero-dark .hero-badge-pill{background:rgba(0,0,0,.06);border-color:rgba(0,0,0,.1)}

.tc-section{padding:52px 40px}
.tc-section-hd{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:10px}
.tc-section-title{font-family:var(--font-display);font-size:30px;font-weight:400;letter-spacing:-.02em}
.tc-section-subtitle{font-size:15px;color:var(--p2);margin-top:4px}
.tc-view-all{font-size:14px;font-weight:600;border:1.5px solid rgba(0,0,0,.12);border-radius:7px;background:none;cursor:pointer;padding:6px 14px;transition:border-color .15s,background .15s;text-decoration:none;white-space:nowrap;flex-shrink:0}
.tc-view-all:hover{border-color:currentColor;background:rgba(0,0,0,.04)}

.tc-cats-grid{display:grid;gap:12px}
.tc-cat-card{background:#fff;border-radius:12px;overflow:hidden;cursor:pointer;position:relative;border:1px solid var(--border);transition:transform .2s var(--ease),box-shadow .2s var(--ease),border-color .2s}
.tc-cat-card:hover{border-color:#d0d0d0;box-shadow:var(--sh1);transform:translateY(-2px)}
.tc-cat-img-wrap{aspect-ratio:1/1;max-height:220px;overflow:hidden;background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:30px;position:relative}
.tc-cat-img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .35s var(--ease)}
.tc-cat-card:hover .tc-cat-img{transform:scale(1.05)}
.tc-cat-footer{padding:10px 12px;background:#fff;display:flex;align-items:center;justify-content:space-between}
.tc-cat-name{font-size:13px;font-weight:600;color:var(--p)}
.tc-cat-count{font-size:11px;color:var(--p3)}
.tc-cats-grid.cats-circle{gap:20px}
.tc-cats-grid.cats-circle .tc-cat-card{background:transparent;border:none;box-shadow:none;display:flex;flex-direction:column;align-items:center;gap:10px;padding:6px 4px;border-radius:0}
.tc-cats-grid.cats-circle .tc-cat-card:hover{transform:translateY(-3px);box-shadow:none;border:none}
.tc-cats-grid.cats-circle .tc-cat-img-wrap{width:100%;max-width:140px;aspect-ratio:1/1;border-radius:50%;border:3px solid transparent;box-shadow:0 2px 10px rgba(0,0,0,.07);transition:border-color .2s,box-shadow .2s}
.tc-cats-grid.cats-circle .tc-cat-card:hover .tc-cat-img-wrap{border-color:var(--primary);box-shadow:0 6px 20px rgba(0,0,0,.12)}
.tc-cats-grid.cats-circle .tc-cat-footer{background:transparent;padding:0;flex-direction:column;align-items:center;gap:2px;width:100%}
.tc-cats-grid.cats-circle .tc-cat-name{font-size:13px;font-weight:700;text-align:center}
.tc-cats-grid.cats-circle .tc-cat-count{font-size:11px;color:var(--p3);text-align:center}

.tc-promo-banner{padding:60px 40px;text-align:center;color:#fff;position:relative;overflow:hidden}
.tc-promo-banner::before{content:'';position:absolute;top:-60px;right:-60px;width:220px;height:220px;background:rgba(255,255,255,.06);border-radius:50%;pointer-events:none}
.tc-promo-content h2{font-family:var(--font-display);font-size:34px;font-weight:400;margin-bottom:10px}
.tc-promo-content p{opacity:.78;margin-bottom:22px;font-size:15px;line-height:1.6}
.banner-coupon-box{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.13);border:1.5px dashed rgba(255,255,255,.4);padding:8px 18px;border-radius:7px;font-size:14px;font-weight:700;letter-spacing:.1em;color:#fff;margin-bottom:18px;font-family:monospace}
.btn-solid-white{background:#fff;color:var(--primary);padding:11px 26px;border-radius:var(--btn-r);font-size:13.5px;font-weight:700;cursor:pointer;font-family:var(--font);border:none;transition:opacity .2s,transform .15s var(--ease-spring);display:inline-flex;align-items:center;gap:8px}
.btn-solid-white:hover{opacity:.92;transform:translateY(-1px)}

.tc-trust-section{padding:24px 40px;border-top:1px solid rgba(0,0,0,.06);border-bottom:1px solid rgba(0,0,0,.06)}
.tc-trust-grid{display:grid;gap:12px}
.tc-trust-item{display:flex;align-items:center;gap:12px;padding:16px 20px;background:var(--card-bg);border-radius:var(--radius);border:1px solid var(--border)}
.tc-trust-item:last-child{border-right:none}
.tc-trust-icon{font-size:22px;flex-shrink:0}
.tc-trust-label{font-size:15px;font-weight:700}
.tc-trust-sub{font-size:13px;opacity:.6;margin-top:2px}

.tc-testimonials{padding:56px 40px}
.tc-testimonials-grid{display:grid;gap:14px;margin-top:28px}
.tc-testimonial{background:#fff;border-radius:12px;padding:22px;border:1px solid var(--border);transition:box-shadow .2s var(--ease)}
.tc-testimonial:hover{box-shadow:var(--sh1)}
.tc-t-stars{font-size:12px;margin-bottom:10px;letter-spacing:2px;color:#f59e0b}
.tc-t-text{font-size:15px;color:var(--p2);line-height:1.75;margin-bottom:14px;font-style:italic}
.tc-t-author{display:flex;align-items:center;gap:10px}
.tc-t-avatar{width:34px;height:34px;border-radius:50%;background:var(--primary);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:13px;flex-shrink:0}
.tc-t-name{font-size:14.5px;font-weight:600}

.tc-newsletter{padding:64px 40px;text-align:center}
.tc-newsletter h2{font-family:var(--font-display);font-size:30px;font-weight:400;letter-spacing:-.02em;margin-bottom:10px}
.tc-newsletter p{margin-bottom:28px;font-size:16px;line-height:1.7;opacity:.7}
.tc-newsletter-form{display:flex;gap:8px;max-width:440px;margin:0 auto;flex-wrap:wrap}
.tc-newsletter-input{flex:1;min-width:180px;padding:12px 18px;border:1.5px solid rgba(0,0,0,.12);border-radius:var(--btn-r);font-size:15px;background:rgba(255,255,255,.9);font-family:var(--font);outline:none;transition:border-color .15s,box-shadow .15s}
.tc-newsletter-input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(0,0,0,.06)}
.tc-nl-note{font-size:11.5px;opacity:.45;margin-top:12px}
.tc-newsletter-dark{background:var(--p);color:#fff}
.tc-newsletter-dark .tc-newsletter-input{background:rgba(255,255,255,.08);color:#fff;border-color:rgba(255,255,255,.15)}
.tc-newsletter-dark .tc-newsletter-input::placeholder{color:rgba(255,255,255,.35)}
.tc-newsletter-dark .tc-newsletter-input:focus{border-color:rgba(255,255,255,.5);box-shadow:0 0 0 3px rgba(255,255,255,.08)}
.tc-newsletter-dark p{color:#fff}

.tc-footer{padding:56px 40px 32px;border-top:1px solid rgba(0,0,0,.08)}
.tc-footer-grid{display:grid;grid-template-columns:2fr 1fr 1fr;gap:48px;margin-bottom:40px}
.tc-footer-logo{font-family:var(--font-display);font-size:19px;font-weight:400;margin-bottom:7px;cursor:pointer}
.tc-footer-tagline{font-size:14px;opacity:.5;line-height:1.75;margin-bottom:16px;max-width:240px}
.tc-footer-contact{font-size:14px;opacity:.65;line-height:1.9;margin-top:10px}
.tc-footer-col-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;opacity:.45;margin-bottom:14px}
.tc-footer-col-links{display:flex;flex-direction:column;gap:10px}
.tc-footer-col-links a{font-size:14.5px;opacity:.65;transition:opacity .15s;cursor:pointer}
.tc-footer-col-links a:hover{opacity:1}
.tc-footer-bottom{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;padding-top:24px;border-top:1px solid rgba(0,0,0,.08)}
.tc-footer-copy{font-size:13.5px;opacity:.4}
.tc-footer-social{display:flex;gap:6px}
.tc-social-btn{width:32px;height:32px;border-radius:8px;background:rgba(0,0,0,.06);display:flex;align-items:center;justify-content:center;font-size:13px;cursor:pointer;text-decoration:none;transition:background .15s}
.tc-social-btn:hover{background:rgba(0,0,0,.1)}

.tc-video-section{padding:56px 40px}
.tc-video-section-hd{margin-bottom:20px;text-align:center}
.tc-video-box{border-radius:14px;min-height:340px;overflow:hidden;background:var(--bg2);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;border:1px solid var(--border)}
.tc-video-box iframe{width:100%;min-height:340px;border:none;display:block}
.tc-play-circle{width:60px;height:60px;border-radius:50%;background:var(--p);display:flex;align-items:center;justify-content:center;font-size:22px;cursor:pointer;color:#fff;box-shadow:var(--sh2);transition:transform .2s var(--ease-spring),box-shadow .2s}
.tc-play-circle:hover{transform:scale(1.08);box-shadow:var(--sh3)}
.tc-play-label{font-size:12.5px;font-weight:600;color:var(--p2)}
.tc-countdown-section{padding:56px 40px;text-align:center}
.tc-countdown-row{display:flex;gap:12px;justify-content:center;margin-top:24px;flex-wrap:wrap}
.tc-cd-unit{background:#fff;border:1px solid var(--border);border-radius:12px;padding:20px 24px;min-width:82px;box-shadow:var(--sh0)}
.tc-cd-num{font-family:var(--font-display);font-size:40px;font-weight:400;line-height:1;color:var(--primary)}

.tc-gallery-item:hover img{transform:scale(1.05)}
.tc-faq-section{padding:56px 40px}

.tc-faq-q{font-size:16px;font-weight:600;display:flex;justify-content:space-between;align-items:center;gap:14px;transition:color .15s}
.tc-faq-q-text{flex:1}
.tc-faq-icon{font-size:18px;opacity:.4;transition:transform .22s var(--ease),opacity .15s;flex-shrink:0;line-height:1}
.tc-faq-item.open .tc-faq-icon{transform:rotate(45deg);opacity:1}
.tc-faq-item.open .tc-faq-q{color:var(--primary)}
.tc-faq-a{font-size:15px;color:var(--p2);line-height:1.75;margin-top:10px;display:none;padding-right:28px}

.tc-about-section{padding:56px 40px}
.about-grid{display:grid;grid-template-columns:1fr 1fr;gap:56px;align-items:center}
.about-heading{font-family:var(--font-display);font-size:30px;font-weight:400;letter-spacing:-.02em;margin-bottom:10px}
.about-subheading{font-size:14.5px;font-weight:700;margin-bottom:12px;line-height:1.6}
.about-body{font-size:15.5px;line-height:1.85;margin-bottom:24px;opacity:.75}
.about-img-wrap{border-radius:14px;overflow:hidden;aspect-ratio:4/3;background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:64px}

.about-stat-label{font-size:14px;margin-top:3px;font-weight:500;opacity:.6}
.tc-richtext-section{padding:56px 40px}
.richtext-inner{margin:0 auto;line-height:1.85}

.richtext-body{font-size:16px;color:var(--p2);line-height:1.85}
.tc-imagetext-section{padding:56px 40px}
.imagetext-grid{display:grid;grid-template-columns:1fr 1fr;gap:56px;align-items:center}
.imagetext-img-wrap{border-radius:14px;overflow:hidden;aspect-ratio:4/3;background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:64px}

.contact-info-icon{font-size:16px;flex-shrink:0;margin-top:2px;width:36px;height:36px;border-radius:9px;background:rgba(0,0,0,.05);display:flex;align-items:center;justify-content:center}

.contact-field textarea{resize:vertical;min-height:110px}

  [data-style="list"] .product-card{height:auto;min-height:unset;max-height:unset;flex-direction:column}

  [data-style="list"] .cart-controls-wrap{width:100%;border-left:none;border-top:1px solid var(--border);padding:8px 12px}
  [data-style="magazine"] .product-card:first-child{grid-column:span 1;grid-row:span 1}

  .cart-bar{padding:0 16px;height:60px}
  body.cart-bar-open{padding-bottom:60px}
  .tc-cd-unit{padding:14px 16px;min-width:68px}

  .ptb-search{width:120px}

}
</style>

<body>

<div id="loader">
  <div class="ld-ring"></div>
  <div class="ld-text">Loading store</div>
</div>

<header id="origHeader">
  <div class="hdr-inner">
    <a class="hdr-logo" href="javascript:void(0)" id="storeLogo" onclick="scrollTop()">
      <span id="storeName">Shop</span>
    </a>
    <nav class="hdr-nav" id="hdrNav"></nav>
    <div class="hdr-right">
      <div id="payBadge">⚡ Pay Online</div>
      <div class="acct-wrap" id="acctWrap">
        <!-- ✅ FIX: onclick handlers now call JS functions defined AFTER slug is resolved -->
        <button class="acct-btn-guest" id="acctBtnGuest" onclick="goToLogin()">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          <span class="acct-btn-text">Login</span>
        </button>
        <button class="acct-btn-user" id="acctBtnUser" style="display:none" onclick="goToAccount()">
          <div class="acct-avatar" id="acctAvatar">?</div>
          <span class="acct-name-text" id="acctName">Account</span>
        </button>
      </div>
      <button class="hdr-cart-btn" onclick="gotoCart()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
        <span class="cart-label" id="cartLabel">Cart</span>
        <span class="cart-badge" id="cartCount">0</span>
      </button>
    </div>
  </div>
</header>

<div id="heroBanner" style="display:none">
  <div style="padding:80px 40px;max-width:1440px;margin:0 auto;text-align:center">
    <h1 id="heroTitle" style="font-family:var(--font-display);font-size:clamp(28px,5vw,56px);font-weight:400;letter-spacing:-.02em;margin-bottom:12px;line-height:1.1">Welcome</h1>
    <p id="heroTagline" style="font-size:15px;color:var(--p2);max-width:420px;margin:0 auto 28px;line-height:1.7">Discover amazing products</p>
    <button class="hero-cta" onclick="smoothScroll()">Shop Now →</button>
  </div>
</div>

<div id="page-sections"></div>

<div class="cart-bar" id="cartBar">
  <div class="cbar-left">
    <div class="cbar-icon">🛒</div>
    <div class="cbar-info">
      <div class="cbar-meta">Your cart</div>
      <div class="cbar-total" id="cbarTotal">₹0.00</div>
    </div>
  </div>
  <div class="cbar-actions">
    <div class="cbar-pill" id="cbarQty">0 items</div>
    <a href="#" class="cbar-btn" id="cartBarBtn">View Cart</a>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ═══════════════════════════════════════════
   CONFIG
═══════════════════════════════════════════ */
function resolveSlug() {
  const fromParam = new URLSearchParams(location.search).get('store')
  if (fromParam) return fromParam
  const hostname = location.hostname
  const ownDomains = ['ai-ekart-storefront.pages.dev', 'ekarts.aasaitech.in', 'ekart.aasaitech.in', 'localhost', '127.0.0.1']
  if (!ownDomains.some(d => hostname.includes(d))) return hostname
  return null
}
const slug = resolveSlug()
if(!slug) document.body.innerHTML='<div style="text-align:center;padding:80px;font-family:sans-serif"><h2>Store not found</h2><p style="color:#888;margin-top:8px">Add ?store=your-slug to the URL</p></div>'

const API = 'https://apiv2.aasaitech.in'
const R = document.documentElement
let storeConfig = {}, themeData = null, currency = '₹'
let activeStyle = 'classic', activeSize = 'medium'
let globalCardSettings = {}

const sectionProducts = {}
const sectionFilters  = {}

const ALL_CARD_STYLES = new Set(['classic','minimal','bold','elevated','compact','list','magazine','overlay'])

const CARD_SIZE_VARS = {
  small:{
    '--card-aspect':'1/1','--card-name-fs':'16px','--card-price-fs':'18px',
    '--card-info-pad':'7px 9px 3px','--card-btn-pad':'4px 9px 9px',
    '--card-btn-h':'32px','--card-btn-fs':'12px','--card-cat-fs':'11.5px',
    '--card-gap':'8px','--card-radius':'10px',
  },
  medium:{
    '--card-aspect':'3/4','--card-name-fs':'16px','--card-price-fs':'18px',
    '--card-info-pad':'10px 12px 5px','--card-btn-pad':'6px 12px 12px',
    '--card-btn-h':'38px','--card-btn-fs':'13px','--card-cat-fs':'11px',
    '--card-gap':'14px','--card-radius':'12px',
  },
  large:{
    '--card-aspect':'4/5','--card-name-fs':'16px','--card-price-fs':'18px',
    '--card-info-pad':'14px 16px 7px','--card-btn-pad':'8px 14px 14px',
    '--card-btn-h':'44px','--card-btn-fs':'14px','--card-cat-fs':'11.5px',
    '--card-gap':'18px','--card-radius':'14px',
  }
}

function applyStyleToGrid(gridEl, style){
  gridEl.setAttribute('data-style', style || 'classic')
  if(style === 'list') gridEl.style.setProperty('--cols','1')
  else gridEl.style.removeProperty('--cols')
}

function applyCardSizeVars(size){
  const vars = CARD_SIZE_VARS[size] || CARD_SIZE_VARS.medium
  Object.entries(vars).forEach(([k,v]) => R.style.setProperty(k,v))
}

function isColorDark(hex){
  const c=(hex||'').replace('#','')
  if(c.length!==6)return false
  const r=parseInt(c.slice(0,2),16),g=parseInt(c.slice(2,4),16),b=parseInt(c.slice(4,6),16)
  return(r*299+g*587+b*114)/1000<145
}
function autoContrastText(bgColor, explicitTextColor){
  if(explicitTextColor) return `color:${explicitTextColor};`
  if(!bgColor) return ''
  return isColorDark(bgColor) ? 'color:#ffffff;' : ''
}

/* ═══════════════════════════════════════════
   UTILS
═══════════════════════════════════════════ */
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')
const hideLoader = () => { const l=document.getElementById('loader'); if(l){l.classList.add('out');setTimeout(()=>l.remove(),450)} }
const showToast = m => { const t=document.getElementById('toast'); t.textContent=m; t.classList.add('on'); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('on'),2400) }
const scrollTop = () => window.scrollTo({top:0,behavior:'smooth'})
const smoothScroll = () => {
  const el = document.querySelector('.featured-section') || document.getElementById('mainAnchor')
  if(el){ const nb=document.querySelector('.tc-navbar')||document.getElementById('origHeader'); window.scrollTo({top:el.getBoundingClientRect().top+scrollY-(nb?nb.offsetHeight+12:70),behavior:'smooth'}) }
}
const scrollToEl = id => { const el=document.getElementById(id); if(!el)return; const nb=document.querySelector('.tc-navbar')||document.getElementById('origHeader'); window.scrollTo({top:el.getBoundingClientRect().top+scrollY-(nb?nb.offsetHeight+12:70),behavior:'smooth'}) }
const isCustomDomain = !new URLSearchParams(location.search).get('store') && slug !== null
const storeUrl = (page, extra='') => isCustomDomain ? `${page}${extra ? '?'+extra : ''}` : `${page}?store=${slug}${extra ? '&'+extra : ''}`
const gotoCart = () => location.href = storeUrl('cart.html')

/* ═══════════════════════════════════════════
   ✅ FIX: Named navigation functions that
   safely call storeUrl() at click-time,
   not at parse-time like inline onclick did.
═══════════════════════════════════════════ */
function goToLogin() {
  location.href = storeUrl('customer-login.html')
}
function goToAccount() {
  location.href = storeUrl('customer-account.html')
}

function initAccountButton() {
  const tok   = localStorage.getItem(`cust_token_${slug}`)
  const name  = localStorage.getItem(`cust_name_${slug}`)
  const guestBtn = document.getElementById('acctBtnGuest')
  const userBtn  = document.getElementById('acctBtnUser')
  if (!guestBtn || !userBtn) return
  if (tok && name) {
    const first   = name.split(' ')[0]
    const initial = first[0].toUpperCase()
    guestBtn.style.display = 'none'
    userBtn.style.display  = 'inline-flex'
    document.getElementById('acctName').textContent   = first
    document.getElementById('acctAvatar').textContent = initial
    // ✅ Re-bind click using JS to guarantee storeUrl is available
    userBtn.onclick = goToAccount
  } else {
    guestBtn.style.display = 'inline-flex'
    userBtn.style.display  = 'none'
    guestBtn.onclick = goToLogin
  }
}

const subscribeNL = (inputEl) => { const v=(inputEl||document.querySelector('.tc-newsletter-input'))?.value?.trim(); showToast(v?`📧 Thanks! We'll reach ${v}`:'Please enter your email') }

function readKey(obj,...keys){ if(!obj)return undefined; for(const k of keys){ const v=obj[k]; if(v!==undefined&&v!==null&&v!=='')return v } return undefined }

/* ═══════════════════════════════════════════
   CART
═══════════════════════════════════════════ */
const getCart = () => JSON.parse(localStorage.getItem('cart_'+slug)||'[]')
const saveCart = c => localStorage.setItem('cart_'+slug, JSON.stringify(c))
const getQty = id => { const i=getCart().find(x=>x.product_id===id&&!x.variant); return i?i.qty:0 }

function getProductData(pid){
  const el = document.querySelector(`.cart-controls[data-pid="${pid}"]`) ||
             document.querySelector(`.ov-ctrl[data-pid="${pid}"]`)
  if(!el) return null
  return { id:pid, name:el.dataset.name, price:parseFloat(el.dataset.price), image:el.dataset.image }
}

function handleCartBtn(btn){
  const pid=btn.dataset.pid, action=btn.dataset.action
  if(!pid) return
  const p=getProductData(pid); if(!p) return
  if(action==='add'||action==='inc') incCart(p.id,p.name,p.price,p.image)
  else if(action==='dec') decCart(p.id)
}

function cardClick(event,pid,storeSlug){
  if(event.target.closest('button,.wish-btn,.cart-controls,.cart-controls-wrap,.ov-ctrl,.card-atc-overlay')) return
  location.href = storeUrl('product.html', `id=${pid}`)
}

function incCart(id,name,price,image){
  const cart=getCart(), i=cart.find(x=>x.product_id===id&&!x.variant)
  if(i) i.qty++; else cart.push({product_id:id,name,price,image,qty:1})
  saveCart(cart); updateCartUI(); refreshProductCard(id); showToast('Added to cart ✓')
}
function decCart(id){
  const cart=getCart(), idx=cart.findIndex(x=>x.product_id===id&&!x.variant)
  if(idx!==-1){ if(cart[idx].qty>1)cart[idx].qty--; else cart.splice(idx,1); saveCart(cart); updateCartUI(); refreshProductCard(id) }
}

function refreshProductCard(id){
  const qty=getQty(id)
  document.querySelectorAll(`.cart-controls[data-pid="${id}"]`).forEach(ctrlEl=>{
    const card=ctrlEl.closest('.product-card')
    const label=(card&&card.dataset.btnLabel)||globalCardSettings.btnLabel||'Add to Cart'
    if(qty===0){
      ctrlEl.innerHTML=`<button class="btn-add" data-action="add" data-pid="${id}" onclick="event.preventDefault();event.stopPropagation();handleCartBtn(this)"><span class="btn-icon">🛒</span>${esc(label)}</button>`
      if(card) card.classList.remove('in-cart')
      const isListStyle=card&&card.closest('.products-grid[data-style="list"]')
      if(card&&!isListStyle){
        let ov=card.querySelector('.card-atc-overlay')
        if(!ov){ const imgWrap=card.querySelector('.product-img'); if(imgWrap){ ov=document.createElement('div'); ov.className='card-atc-overlay'; ov.innerHTML=`<button class="card-atc-btn" data-action="add" data-pid="${id}" onclick="event.preventDefault();event.stopPropagation();handleCartBtn(this)">🛒 ${esc(label)}</button>`; imgWrap.appendChild(ov) } }
      }
    } else {
      ctrlEl.innerHTML=`<div class="cart-qty-row"><button class="qty-btn" data-action="dec" data-pid="${id}" onclick="event.preventDefault();event.stopPropagation();handleCartBtn(this)">−</button><span class="qty-value">${qty}</span><button class="qty-btn" data-action="inc" data-pid="${id}" onclick="event.preventDefault();event.stopPropagation();handleCartBtn(this)">+</button></div>`
      if(card){ card.classList.add('in-cart'); const ov=card.querySelector('.card-atc-overlay'); if(ov) ov.remove() }
    }
  })
  document.querySelectorAll(`.ov-ctrl[data-pid="${id}"]`).forEach(ovCtrl=>{
    const card=ovCtrl.closest('.product-card')
    const label=(card&&card.dataset.btnLabel)||globalCardSettings.btnLabel||'Add to Cart'
    if(qty===0){
      ovCtrl.innerHTML=`<button class="ov-btn" data-action="add" data-pid="${id}" onclick="event.preventDefault();event.stopPropagation();handleCartBtn(this)">🛒 ${esc(label)}</button>`
      if(card) card.classList.remove('in-cart')
    } else {
      ovCtrl.innerHTML=`<div class="ov-qty-row"><button class="ov-qty-btn" data-action="dec" data-pid="${id}" onclick="event.preventDefault();event.stopPropagation();handleCartBtn(this)">−</button><span class="ov-qty-val">${qty}</span><button class="ov-qty-btn" data-action="inc" data-pid="${id}" onclick="event.preventDefault();event.stopPropagation();handleCartBtn(this)">+</button></div>`
      if(card) card.classList.add('in-cart')
    }
  })
}

   UPDATE CART UI
═══════════════════════════════════════════ */
function updateCartUI(){
  const cart=getCart()
  const qty=cart.reduce((s,x)=>s+x.qty,0)
  const amt=cart.reduce((s,x)=>s+x.price*x.qty,0)

  const el=document.getElementById('cartCount')
  el.textContent=qty; el.className='cart-badge'+(qty>0?' on':'')
  document.getElementById('cartLabel').textContent=qty>0?`(${qty})`:'Cart'

  const bar=document.getElementById('cartBar')
  if(qty>0){
    bar.classList.add('on')
    document.body.classList.add('cart-bar-open')
    document.getElementById('cbarQty').textContent=`${qty} item${qty!==1?'s':''}`
    document.getElementById('cbarTotal').textContent=`${currency}${amt.toFixed(2)}`
  } else {
    bar.classList.remove('on')
    document.body.classList.remove('cart-bar-open')
  }
  document.querySelectorAll('.theme-cart-qty').forEach(e=>e.textContent=qty)
}

function toggleWish(pid,btn){
  const key=`wish_${slug}`,list=JSON.parse(localStorage.getItem(key)||'[]'),idx=list.indexOf(pid)
  if(idx===-1){ list.push(pid); btn.textContent='♥'; btn.classList.add('wished'); showToast('Saved to wishlist') }
  else { list.splice(idx,1); btn.textContent='♡'; btn.classList.remove('wished'); showToast('Removed from wishlist') }
  localStorage.setItem(key,JSON.stringify(list))
}
function restoreWish(){
  const list=JSON.parse(localStorage.getItem(`wish_${slug}`)||'[]')
  list.forEach(pid=>{
    document.querySelectorAll('.product-card').forEach(card=>{
      const cc=card.querySelector(`.cart-controls[data-pid="${pid}"]`)
      if(cc){ const wb=card.querySelector('.wish-btn'); if(wb){ wb.textContent='♥'; wb.classList.add('wished') } }
    })
  })
}

const discPct = p => p.compare_at_price&&p.compare_at_price>p.price ? Math.round((1-p.price/p.compare_at_price)*100) : 0
const isOOS   = p => p.track_inventory&&p.stock_qty<=0

function getBadge(p,cls){
  const bt=p.badge_text||p.badge||''
  if(bt){ const bl=bt.toLowerCase(), c=bl.includes('best')||bl.includes('seller')?'badge-bestseller':bl.includes('new')?'badge-new':bl.includes('trend')?'badge-trending':bl.includes('hot')?'badge-hot':bl.includes('sale')?'badge-sale':'badge-custom'; return`<div class="${cls} ${c}">${esc(bt)}</div>` }
  const d=discPct(p); if(d>=5) return`<div class="${cls} badge-discount">−${d}%</div>`; return ''
}

const colorPairs=[['#e8f4f8','#b2d8e8'],['#f8f0e8','#e8c8a8'],['#f0f8e8','#c8e8b0'],['#f8e8f0','#e8b0c8'],['#f0e8f8','#c8b0e8'],['#f8f8e8','#e8e8a0']]

function renderCard(p,cardOpts,styleOverride){
  cardOpts=cardOpts||{}
  const label      = cardOpts.btnLabel   || globalCardSettings.btnLabel   || 'Add to Cart'
  const cardBg     = cardOpts.cardBg     || globalCardSettings.cardBg     || '#ffffff'
  const priceColor = cardOpts.priceColor || globalCardSettings.priceColor || '#000000'
  const showOrig   = (cardOpts.showOriginal!=='no')&&(globalCardSettings.showOriginal!=='no')
  const showBadge  = (cardOpts.showBadge!=='no')&&(globalCardSettings.showBadge!=='no')
  const style      = styleOverride || activeStyle
  const cardBgStyle= `--card-bg:${cardBg}`
  const priceStyle = `style="color:${priceColor}"`
  const oos=isOOS(p),qty=getQty(p._id),imgUrl=p.images?.[0]||''
  const d=discPct(p)
  const cIdx=(p.name||'').split('').reduce((s,c)=>s+c.charCodeAt(0),0)%colorPairs.length
  const [bg1,bg2c]=colorPairs[cIdx]
  const gradBg=imgUrl?'':`background:linear-gradient(135deg,${bg1},${bg2c});`
  const pid=p._id
  const ctrlData=`data-pid="${pid}" data-name="${esc(p.name)}" data-price="${p.price}" data-image="${esc(imgUrl)}"`
  const imgTag=imgUrl?`<img src="${imgUrl}" alt="${esc(p.name)}" loading="lazy" onerror="this.closest('.product-img').classList.add('img-error')">`:'';
  const fallback=`<div class="img-fallback-icon">🛍️</div>`
  const badge=showBadge?getBadge(p,'product-badge'):''
  const wish=`<button class="wish-btn" data-wish="${pid}" onclick="event.preventDefault();event.stopPropagation();toggleWish(this.dataset.wish,this)">♡</button>`

  if(style==='overlay'){
    let ovCtrlHTML
    if(oos) ovCtrlHTML=`<div class="ov-ctrl" ${ctrlData}><span style="opacity:.5;font-size:11.5px">Out of stock</span></div>`
    else if(qty>0) ovCtrlHTML=`<div class="ov-ctrl" ${ctrlData}><div class="ov-qty-row"><button class="ov-qty-btn" data-action="dec" data-pid="${pid}" onclick="event.preventDefault();event.stopPropagation();handleCartBtn(this)">−</button><span class="ov-qty-val">${qty}</span><button class="ov-qty-btn" data-action="inc" data-pid="${pid}" onclick="event.preventDefault();event.stopPropagation();handleCartBtn(this)">+</button></div></div>`
    else ovCtrlHTML=`<div class="ov-ctrl" ${ctrlData}><button class="ov-btn" data-action="add" data-pid="${pid}" onclick="event.preventDefault();event.stopPropagation();handleCartBtn(this)">🛒 ${esc(label)}</button></div>`
    return`<div class="product-card${qty>0?' in-cart':''}" data-pid="${pid}" data-btn-label="${esc(label)}" style="${cardBgStyle}"><div class="card-link" onclick="cardClick(event,'${pid}','${slug}')"><div class="product-img" style="${gradBg}">${fallback}${badge}${wish}${imgTag}<div class="ov-layer"><div class="ov-name">${esc(p.name)}</div><div class="ov-price-row"><span class="ov-price" ${priceStyle}>${currency}${p.price.toFixed(2)}</span>${showOrig&&p.compare_at_price?`<span class="ov-compare">${currency}${p.compare_at_price.toFixed(2)}</span>`:''} ${d?`<span class="ov-discount">−${d}%</span>`:''}</div>${ovCtrlHTML}</div></div></div></div>`
  }

  let ctrlInner
  if(oos) ctrlInner=`<span class="out-of-stock-label">Out of stock</span>`
  else if(qty>0) ctrlInner=`<div class="cart-qty-row"><button class="qty-btn" data-action="dec" data-pid="${pid}" onclick="event.preventDefault();event.stopPropagation();handleCartBtn(this)">−</button><span class="qty-value">${qty}</span><button class="qty-btn" data-action="inc" data-pid="${pid}" onclick="event.preventDefault();event.stopPropagation();handleCartBtn(this)">+</button></div>`
  else ctrlInner=`<button class="btn-add" data-action="add" data-pid="${pid}" onclick="event.preventDefault();event.stopPropagation();handleCartBtn(this)"><span class="btn-icon">🛒</span>${esc(label)}</button>`
  const ctrlHTML=`<div class="cart-controls" ${ctrlData}>${ctrlInner}</div>`
  const isListStyle=style==='list'
  const hoverAtc=(oos||qty>0||isListStyle)?'':`<div class="card-atc-overlay"><button class="card-atc-btn" data-action="add" data-pid="${pid}" onclick="event.preventDefault();event.stopPropagation();handleCartBtn(this)">🛒 ${esc(label)}</button></div>`
  return`<div class="product-card${qty>0?' in-cart':''}" data-pid="${pid}" data-btn-label="${esc(label)}" style="${cardBgStyle}"><div class="card-link" onclick="cardClick(event,'${pid}','${slug}')"><div class="product-img" style="${gradBg}">${badge}${wish}${imgTag}${fallback}${hoverAtc}</div><div class="product-info">${p.category_name?`<div class="product-cat">${esc(p.category_name)}</div>`:''}<div class="product-name">${esc(p.name)}</div><div class="product-price-row"><span class="product-price" ${priceStyle}>${currency}${p.price.toFixed(2)}</span>${showOrig&&p.compare_at_price?`<span class="product-compare">${currency}${p.compare_at_price.toFixed(2)}</span>`:''} ${d?`<span class="product-discount">−${d}%</span>`:''}</div></div></div><div class="cart-controls-wrap">${ctrlHTML}</div></div>`
}

/* ═══════════════════════════════════════════
   FILTER / SORT ENGINE
═══════════════════════════════════════════ */
function applyFilters(secId){
  const prods=sectionProducts[secId]||[], filter=sectionFilters[secId]||{}
  const grid=document.getElementById(`${secId}-grid`)
  const toolbar=document.getElementById(`${secId}-toolbar`)
  if(!grid) return

  let filtered=[...prods]
  if(filter.cat&&filter.cat!=='_all') filtered=filtered.filter(p=>(p.category_name||'').toLowerCase()===filter.cat.toLowerCase())
  if(filter.search){ const q=filter.search.toLowerCase(); filtered=filtered.filter(p=>(p.name||'').toLowerCase().includes(q)||(p.category_name||'').toLowerCase().includes(q)) }
  switch(filter.sort){
    case 'price_asc':  filtered.sort((a,b)=>a.price-b.price);break
    case 'price_desc': filtered.sort((a,b)=>b.price-a.price);break
    case 'name_asc':   filtered.sort((a,b)=>(a.name||'').localeCompare(b.name||''));break
    case 'discount':   filtered.sort((a,b)=>discPct(b)-discPct(a));break
    default:break
  }

  const countEl=document.getElementById(`${secId}-count`)
  if(countEl) countEl.textContent=`${filtered.length} product${filtered.length!==1?'s':''}`

  if(toolbar){ toolbar.querySelectorAll('.ptb-filter-pill[data-cat]').forEach(pill=>{ const isAll=pill.dataset.cat==='_all'; pill.classList.toggle('active',isAll?(!filter.cat||filter.cat==='_all'):pill.dataset.cat===filter.cat) }) }

  const view=filter.view||(grid.getAttribute('data-style')||activeStyle)
  applyStyleToGrid(grid,view)

  const sizeKeyF=(grid._cardOpts&&grid._cardOpts.cardSize)||activeSize
  const sizeVarsF=CARD_SIZE_VARS[sizeKeyF]||CARD_SIZE_VARS[activeSize]||CARD_SIZE_VARS.medium
  const secElF=document.getElementById(secId)
  if(secElF) Object.entries(sizeVarsF).forEach(([k,v])=>secElF.style.setProperty(k,v))

  const cardOpts=grid._cardOpts||{}
  if(!filtered.length){ grid.innerHTML=`<div class="products-empty"><span>🔍</span>No products match your search</div>` }
  else { grid.innerHTML=filtered.map(p=>renderCard(p,cardOpts,view)).join('') }
  restoreWish(); updateCartUI()
}

  const toolbar=document.getElementById(`${secId}-toolbar`); if(!toolbar) return
  const cats=[...new Set(prods.map(p=>p.category_name).filter(Boolean))]

  cats.forEach(c=>{ pillsHTML+=`<button class="ptb-filter-pill" data-cat="${esc(c)}" onclick="setCatFilter('${secId}','${esc(c)}')">${esc(c)}</button>` })
  toolbar.innerHTML=`
    <span class="ptb-count" id="${secId}-count">${prods.length} products</span>

    <div class="ptb-right">

function setCatFilter(secId,cat){ if(!sectionFilters[secId])sectionFilters[secId]={}; sectionFilters[secId].cat=cat; applyFilters(secId) }
function setSearchFilter(secId,val){ if(!sectionFilters[secId])sectionFilters[secId]={}; sectionFilters[secId].search=val.trim(); applyFilters(secId) }
function setSortFilter(secId,val){ if(!sectionFilters[secId])sectionFilters[secId]={}; sectionFilters[secId].sort=val; applyFilters(secId) }
function setViewFilter(secId,view,btn){
  if(!sectionFilters[secId])sectionFilters[secId]={}
  sectionFilters[secId].view=view
  const toolbar=document.getElementById(`${secId}-toolbar`)
  if(toolbar) toolbar.querySelectorAll('.ptb-view-btn').forEach(b=>b.classList.toggle('active',b===btn))
  applyFilters(secId)
}

    case 'brands':{
