      return`<section class="tc-brands-section" style="${bgS}${tcS}">${d.title?`<div style="text-align:center;margin-bottom:18px"><div class="tc-section-title">${esc(d.title)}</div></div>`:''}<div class="brands-grid">${brands.map(b=>`<div class="brand-pill">${esc(b)}</div>`).join('')}</div></section>`
    }

    case 'offers':{
      const oCols=isMobile?1:(parseInt(d.columns)||3)
      const offers=[{title:d.offer1title||'Flat 30% Off',desc:d.offer1desc||'On all Electronics',code:d.offer1code||'ELEC30',bg:d.offer1bg||'#5b5cf6'},{title:d.offer2title||'Buy 2 Get 1 Free',desc:d.offer2desc||'On selected Fashion',code:d.offer2code||'B2G1',bg:d.offer2bg||'#ec4899'},{title:d.offer3title||'Free Delivery',desc:d.offer3desc||'On orders above ₹499',code:d.offer3code||'FREEDEL',bg:d.offer3bg||'#10b981'}].filter(o=>o.title)
      return`<section class="tc-offers-section" style="${bgS}${tcS}"><div class="tc-section-hd"><div class="tc-section-title">${esc(d.title||'Hot Deals')}</div></div><div class="offers-grid" style="grid-template-columns:repeat(${oCols},1fr)">${offers.map(o=>`<div class="offer-card" style="background:${o.bg}"><div class="offer-card-inner"><div class="offer-title">${esc(o.title)}</div><div class="offer-desc">${esc(o.desc)}</div>${o.code?`<div class="offer-code-wrap">🎫 ${esc(o.code)}</div>`:''}</div></div>`).join('')}</div></section>`
    }

    case 'team':{
      const tCols=isMobile?2:(parseInt(d.columns)||3)
      const members=[[d.m1name,d.m1role,d.m1img],[d.m2name,d.m2role,d.m2img],[d.m3name,d.m3role,d.m3img]].filter(([n])=>n)
      return`<section class="tc-team-section" style="${bgS}${tcS}"><div class="tc-section-hd"><div class="tc-section-title">${esc(d.title||'Meet Our Team')}</div></div><div class="team-grid" style="grid-template-columns:repeat(${tCols},1fr)">${members.map(([n,r,img])=>`<div class="team-card"><div class="team-avatar">${img?`<img src="${esc(img)}" alt="${esc(n)}">`:esc((n||'?')[0])}</div><div class="team-info"><div class="team-name">${esc(n)}</div><div class="team-role">${esc(r||'')}</div></div></div>`).join('')}</div></section>`
    }

    case 'contact':return`<section class="tc-contact-section" style="${bgS}${tcS}"><div class="tc-section-hd"><div><div class="tc-section-title">${esc(d.title||'Get in Touch')}</div>${d.subtitle?`<div class="tc-section-subtitle">${esc(d.subtitle)}</div>`:''}</div></div><div class="contact-grid" style="grid-template-columns:${isMobile?'1fr':'1fr 1.5fr'}"><div>${d.contactEmail?`<div class="contact-info-item"><div class="contact-info-icon">✉️</div><div><div class="contact-info-label">Email</div><div class="contact-info-val">${esc(d.contactEmail)}</div></div></div>`:''} ${d.contactPhone?`<div class="contact-info-item"><div class="contact-info-icon">📞</div><div><div class="contact-info-label">Phone</div><div class="contact-info-val">${esc(d.contactPhone)}</div></div></div>`:''} ${d.contactAddress?`<div class="contact-info-item"><div class="contact-info-icon">📍</div><div><div class="contact-info-label">Address</div><div class="contact-info-val">${esc(d.contactAddress)}</div></div></div>`:''}</div><div class="contact-form-grid"><div class="contact-field"><label>Name</label><input type="text" placeholder="Your name"></div><div class="contact-field"><label>Email</label><input type="email" placeholder="you@example.com"></div><div class="contact-field"><label>Message</label><textarea placeholder="Your message…"></textarea></div><button class="btn-cta" onclick="showToast('Message sent! 📬')">${esc(d.btnSubmit)}</button></div></div></section>`

    default: return ''
  }
}

/* ═══════════════════════════════════════════
   FILL FEATURED
═══════════════════════════════════════════ */
async function fillFeatured(secId,count,cardOpts){
  const grid=document.getElementById(`${secId}-grid`); if(!grid)return
  try{
    const data=await fetch(`${API}/shop/${slug}/products?page=1&limit=${count}`).then(r=>r.json())
    const prods=data.products||[]
    if(!prods.length){ const s=grid.closest('section'); if(s)s.style.display='none'; return }
    sectionProducts[secId]=prods
    sectionFilters[secId]={cat:'_all',search:'',sort:'featured',view:null}
    grid._cardOpts=cardOpts
    const sectionStyle=cardOpts.cardStyle||activeStyle
    grid.className='products-grid'
    applyStyleToGrid(grid,sectionStyle)
    const sizeKey=cardOpts.cardSize||activeSize
    const sizeVarsNow=CARD_SIZE_VARS[sizeKey]||CARD_SIZE_VARS[activeSize]||CARD_SIZE_VARS.medium
    const secEl=document.getElementById(secId)
    if(secEl) Object.entries(sizeVarsNow).forEach(([k,v])=>secEl.style.setProperty(k,v))
    setupToolbar(secId,prods,cardOpts)
    grid.innerHTML=prods.map(p=>renderCard(p,cardOpts,sectionStyle)).join('')
    restoreWish(); updateCartUI()
  }catch(e){ console.warn('[featured]',e.message); const s=document.getElementById(secId); if(s)s.style.display='none' }
}

/* ═══════════════════════════════════════════
   FILL CATEGORIES
═══════════════════════════════════════════ */
async function fillCats(secId,cols,d,catStyle){
  const grid=document.getElementById(`${secId}-grid`); if(!grid)return
  const style=(catStyle||'image').toLowerCase()
  const isCircle=style==='circle'||style==='circular'||style==='round'
  if(isCircle)grid.classList.add('cats-circle')
  try{
    const cats=await fetch(`${API}/shop/${slug}/categories`).then(r=>r.json())
    const list=Array.isArray(cats)?cats:[]
    if(!list.length){ const s=grid.closest('section'); if(s)s.style.display='none'; return }
    const emMap={fashion:'👗',clothing:'👕',electronics:'📱',tech:'💻',home:'🏠',living:'🛋️',beauty:'💄',gaming:'🎮',food:'🍕',accessories:'👜',footwear:'👟',sports:'⚽',fitness:'💪',books:'📚',toys:'🧸',jewelry:'💎',health:'💊'}
    const getEmoji=n=>{ const lc=(n||'').toLowerCase(); for(const[k,v]of Object.entries(emMap))if(lc.includes(k))return v; return['🛍️','🎁','⭐','🏷️','✨','🎯'][(n||'?').charCodeAt(0)%6] }
    const showCount=d.showCount!=='no'
    const bg1=['#fef3c7','#fce7f3','#e0f2fe','#dcfce7','#ede9fe','#ffedd5']
    grid.innerHTML=list.map(c=>{
      const emoji=c.icon||getEmoji(c.name)
      const count=showCount&&c.product_count!=null?`${c.product_count}+`:''
      if(isCircle){ const imgContent=c.image_url?`<img class="tc-cat-img" src="${esc(c.image_url)}" alt="${esc(c.name)}" loading="lazy" onerror="this.parentElement.innerHTML='<span style=\\'font-size:40px\\'>${emoji}</span>'">`:'' ; return`<div class="tc-cat-card"><div class="tc-cat-img-wrap">${imgContent||`<span style="font-size:40px">${emoji}</span>`}</div><div class="tc-cat-footer"><span class="tc-cat-name">${esc(c.name)}</span>${count?`<span class="tc-cat-count">${count}</span>`:''}</div></div>` }
      if(c.image_url) return`<div class="tc-cat-card"><div class="tc-cat-img-wrap"><img class="tc-cat-img" src="${esc(c.image_url)}" alt="${esc(c.name)}" loading="lazy"></div><div class="tc-cat-footer"><span class="tc-cat-name">${esc(c.name)}</span>${count?`<span class="tc-cat-count">${count}</span>`:''}</div></div>`
      const bgColor=bg1[(c.name||'?').charCodeAt(0)%bg1.length]
      return`<div class="tc-cat-card"><div class="tc-cat-img-wrap" style="background:${bgColor}"><span style="font-size:44px">${emoji}</span></div><div class="tc-cat-footer"><span class="tc-cat-name">${esc(c.name)}</span>${count?`<span class="tc-cat-count">${count}</span>`:''}</div></div>`
    }).join('')
  }catch(e){ console.warn('[cats]',e.message); const s=document.getElementById(secId); if(s)s.style.display='none' }
}

function startCountdowns(){
  document.querySelectorAll('[data-countdown]').forEach(el=>{
    const end=new Date(el.getAttribute('data-countdown')).getTime()
    function tick(){const diff=end-Date.now();if(diff<=0)return;const pad=n=>String(Math.max(0,Math.floor(n))).padStart(2,'0');const d=el.querySelector('.cd-days'),h=el.querySelector('.cd-hrs'),m=el.querySelector('.cd-min'),s=el.querySelector('.cd-sec');if(d)d.textContent=pad(diff/86400000);if(h)h.textContent=pad((diff%86400000)/3600000);if(m)m.textContent=pad((diff%3600000)/60000);if(s)s.textContent=pad((diff%60000)/1000)}
    tick();setInterval(tick,1000)
  })
}

/* ═══════════════════════════════════════════
   LOAD THEME
═══════════════════════════════════════════ */
async function loadTheme(){
  try{
    const res=await fetch(`${API}/shop/${slug}/theme`); if(!res.ok)return
    const raw=await res.json()
    let doc
    if(raw.published&&typeof raw.published==='object') doc=raw.published
    else if(raw.draft&&typeof raw.draft==='object') doc=raw.draft
    else if(raw.settings||raw.sections) doc=raw
    else doc={settings:raw,sections:[]}
    themeData=doc
    applySettings(doc.settings||doc)
    const sections=(doc.sections||[]).map(s=>({...s,type:resolveType(s.type)}))
    renderSections(sections)
  }catch(e){ console.warn('[theme]',e.message) }
}

function applySettings(s){
  if(!s||typeof s!=='object') return
  const primary  = readKey(s,'primary_color','primaryColor')||'#0f0f0f'
  const bg       = readKey(s,'secondary_color','bgColor','bg_color','background_color')||'#fafafa'
  const text     = readKey(s,'accent_color','textColor','text_color')||'#0f0f0f'
  const radiusRaw= readKey(s,'radius','border_radius')||'12px'
  const radius   = typeof radiusRaw==='number'?`${radiusRaw}px`:String(radiusRaw).includes('px')?radiusRaw:`${radiusRaw}px`
  const font     = readKey(s,'font_heading','fontHeading','font')||'DM Sans'
  const btnStyle = readKey(s,'button_style','buttonStyle','btnStyle')||'rounded'
  const cols     = readKey(s,'cols','columns')||4
  const cardBg   = readKey(s,'card_bg','cardBg','card_background')||'#ffffff'
  const navBg    = readKey(s,'nav_bg','navBg')

  globalCardSettings = {
    cardBg,
    priceColor: readKey(s,'price_color','priceColor')||primary,
    btnLabel:   readKey(s,'add_to_cart_label','btnText')||'Add to Cart',
    showOriginal: readKey(s,'show_original_price','showOldPrice')||'yes',
    showBadge:  readKey(s,'show_product_badge','showBadge')||'no',
  }

  const btnR = btnStyle==='pill'?'999px' : btnStyle==='square'?'4px' : radius

  R.style.setProperty('--primary',primary)
  R.style.setProperty('--brand',primary)
  R.style.setProperty('--p',text)
  R.style.setProperty('--bg',bg)
  R.style.setProperty('--radius',radius)
  R.style.setProperty('--card-radius',radius)
  R.style.setProperty('--btn-r',btnR)
  R.style.setProperty('--card-price-color',globalCardSettings.priceColor)
  R.style.setProperty('--font',`'${font}',system-ui,sans-serif`)
  R.style.setProperty('--cols',String(parseInt(cols)||4))
  if(navBg) R.style.setProperty('--navbar-bg',navBg)
  document.body.style.background=bg

  try {
    sessionStorage.setItem(`ekart_theme_${slug}`, JSON.stringify({
      primary, bg, text, radius, btnR, font,
      cardBg, priceColor: globalCardSettings.priceColor
    }))
  } catch(e) {}

  if(font&&font!=='DM Sans'&&font!=='system-ui'){
    const fid='gf-'+font.replace(/\s+/g,'-')
    if(!document.getElementById(fid)){const l=document.createElement('link');l.id=fid;l.rel='stylesheet';l.href=`https://fonts.googleapis.com/css2?family=${encodeURIComponent(font)}:wght@400;500;600;700;800&display=swap`;document.head.appendChild(l)}
  }

  const rawStyle=readKey(s,'card_style','cardStyle')||'classic'
  activeStyle=ALL_CARD_STYLES.has(rawStyle)?rawStyle:'classic'
  activeSize=readKey(s,'card_size','cardSize')||'medium'
  applyCardSizeVars(activeSize)
  syncGridStyles()
}

/* ═══════════════════════════════════════════
   RENDER SECTIONS
═══════════════════════════════════════════ */
function renderSections(sections){
  const isMobile=window.innerWidth<=768
  const visible=sections
    .filter(s=>s.is_visible!==false&&s.enabled!==false)
    .sort((a,b)=>(a.order||0)-(b.order||0))
  if(!visible.length) return

  const hasNavbar=visible.some(s=>s.type==='navbar')
  const hasHero=visible.some(s=>s.type==='hero')
  document.getElementById('origHeader').style.display=hasNavbar?'none':''
  const hb=document.getElementById('heroBanner')
  if(hasHero) hb.style.display='none'; else hb.classList.add('visible')

  const page=document.getElementById('page-sections')
  page.innerHTML=''

  const allHtml = visible.map(sec=>buildSec(sec,isMobile)).filter(Boolean).join('')
  const tmpl = document.createElement('template')
  tmpl.innerHTML = allHtml
  page.appendChild(tmpl.content)

  const injectSlot = document.getElementById('navAcctInject')
  const acctWrap   = document.getElementById('acctWrap')
  if (injectSlot && acctWrap) {
    injectSlot.appendChild(acctWrap)
    // ✅ FIX: Re-apply onclick bindings after DOM move,
    // because moving a node can orphan event listeners in some browsers.
    const guestBtn = document.getElementById('acctBtnGuest')
    const userBtn  = document.getElementById('acctBtnUser')
    if(guestBtn) guestBtn.onclick = goToLogin
    if(userBtn)  userBtn.onclick  = goToAccount
  }

  document.querySelectorAll('.theme-cart-qty').forEach(e=>e.textContent=getCart().reduce((s,x)=>s+x.qty,0))
  setTimeout(()=>{ startCountdowns(); updateCartUI() },80)

  window.addEventListener('resize',()=>{
    applyCardSizeVars(activeSize)
    document.querySelectorAll('.products-grid[data-style="list"]').forEach(g=>g.style.setProperty('--cols','1'))
  },{passive:true})
}

/* ═══════════════════════════════════════════
   INIT
═══════════════════════════════════════════ */
async function init(){
  try{
    storeConfig=await fetch(`${API}/shop/${slug}/config`).then(r=>r.json())
    if(storeConfig.error) throw new Error(storeConfig.error)
    document.title=storeConfig.name
    document.getElementById('storeName').textContent=storeConfig.name
    document.getElementById('heroTitle').textContent=storeConfig.name
    document.getElementById('heroTagline').textContent=storeConfig.tagline||storeConfig.description||'Discover amazing products'
    if(storeConfig.logo_url){const img=document.createElement('img');img.src=storeConfig.logo_url;img.style.cssText='height:28px;object-fit:contain;border-radius:5px';document.getElementById('storeLogo').prepend(img)}
    if(storeConfig.brand_color) R.style.setProperty('--primary',storeConfig.brand_color)
    if(storeConfig.currency==='USD') currency='$'; else if(storeConfig.currency==='EUR') currency='€'
    if(storeConfig.payment_enabled) document.getElementById('payBadge').style.display='flex'
    sessionStorage.setItem('ekart_store',slug)
    sessionStorage.setItem('ekart_currency',currency)
    sessionStorage.setItem('ekart_store_name',storeConfig.name)
    sessionStorage.setItem('ekart_pay_enabled',storeConfig.payment_enabled?'1':'0')
    document.getElementById('cartBarBtn').href = storeUrl('cart.html')
    await loadTheme()
    initAccountButton()
    updateCartUI()
    hideLoader()
    if(!document.querySelector('.tc-hero')) document.getElementById('heroBanner').classList.add('visible')
  }catch(e){
    document.body.innerHTML=`<div style="text-align:center;padding:80px;font-family:sans-serif"><div style="font-size:44px;margin-bottom:14px;opacity:.18">🏪</div><h2 style="font-size:18px;font-weight:700;margin-bottom:7px">Store not found</h2><p style="color:#9ca3af;font-size:13.5px">${esc(e.message)}</p></div>`
    hideLoader()
  }
}

if(slug){ setTimeout(hideLoader,6000); init() } else hideLoader()
</script>
